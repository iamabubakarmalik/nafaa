packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  bcrypt: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - sharp
  - bcrypt
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - esbuild
  - msgpackr-extract
  - '@scarf/scarf'
  - '@nestjs/core'
