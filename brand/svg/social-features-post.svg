<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgGrad)"/>

  <!-- Header -->
  <text x="540" y="120" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="#15803d" text-anchor="middle">Why Nafaa?</text>
  <text x="540" y="170" font-family="'Noto Nastaliq Urdu', serif" font-size="36" fill="#16a34a" text-anchor="middle">نفع کیوں؟</text>

  <!-- Feature 1 -->
  <g transform="translate(540, 290)">
    <rect x="-440" y="-50" width="880" height="120" rx="20" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <circle cx="-380" cy="10" r="40" fill="#16a34a"/>
    <text x="-380" y="22" font-family="sans-serif" font-size="40" fill="#ffffff" text-anchor="middle">💰</text>
    <text x="-310" y="-5" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#14532d">Fast Billing</text>
    <text x="-310" y="35" font-family="Inter, sans-serif" font-size="22" fill="#15803d">Barcode scan • Cash, Card, JazzCash</text>
  </g>

  <!-- Feature 2 -->
  <g transform="translate(540, 440)">
    <rect x="-440" y="-50" width="880" height="120" rx="20" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <circle cx="-380" cy="10" r="40" fill="#2563eb"/>
    <text x="-380" y="22" font-family="sans-serif" font-size="40" fill="#ffffff" text-anchor="middle">📦</text>
    <text x="-310" y="-5" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#14532d">Stock Manage</text>
    <text x="-310" y="35" font-family="Inter, sans-serif" font-size="22" fill="#15803d">Low stock alerts • Multi-shop ready</text>
  </g>

  <!-- Feature 3 -->
  <g transform="translate(540, 590)">
    <rect x="-440" y="-50" width="880" height="120" rx="20" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <circle cx="-380" cy="10" r="40" fill="#f59e0b"/>
    <text x="-380" y="22" font-family="sans-serif" font-size="40" fill="#ffffff" text-anchor="middle">📒</text>
    <text x="-310" y="-5" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#14532d">Khata / Udhaar</text>
    <text x="-310" y="35" font-family="Inter, sans-serif" font-size="22" fill="#15803d">Customer credit • WhatsApp reminders</text>
  </g>

  <!-- Feature 4 -->
  <g transform="translate(540, 740)">
    <rect x="-440" y="-50" width="880" height="120" rx="20" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
    <circle cx="-380" cy="10" r="40" fill="#7c3aed"/>
    <text x="-380" y="22" font-family="sans-serif" font-size="40" fill="#ffffff" text-anchor="middle">🌙</text>
    <text x="-310" y="-5" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#14532d">Urdu + Dark Mode</text>
    <text x="-310" y="35" font-family="Inter, sans-serif" font-size="22" fill="#15803d">Full RTL support • Eye-friendly UI</text>
  </g>

  <!-- Bottom badge -->
  <g transform="translate(540, 940)">
    <rect x="-180" y="-35" width="360" height="70" rx="35" fill="#16a34a"/>
    <text x="0" y="12" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle">🇵🇰 nafaa.pk</text>
  </g>

  <text x="540" y="1030" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#15803d" text-anchor="middle">Made in Pakistan, for Pakistani shopkeepers</text>
</svg>
