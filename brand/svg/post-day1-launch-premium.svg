<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <!-- Premium green gradient background -->
    <linearGradient id="premiumBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="35%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>

    <!-- Glow effect behind icon -->
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(251,191,36,0.4)"/>
      <stop offset="60%" stop-color="rgba(251,191,36,0.1)"/>
      <stop offset="100%" stop-color="rgba(251,191,36,0)"/>
    </radialGradient>

    <!-- White tile gradient -->
    <linearGradient id="tileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>

    <!-- Gold gradient for accents -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Shadow filter for depth -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dy="18"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle glow on text -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══════════ BACKGROUND ═══════════ -->
  <rect width="1080" height="1080" fill="url(#premiumBg)"/>

  <!-- Decorative grid pattern (subtle texture) -->
  <g fill="rgba(255,255,255,0.03)">
    <circle cx="80" cy="80" r="3"/>
    <circle cx="280" cy="120" r="2"/>
    <circle cx="500" cy="60" r="3"/>
    <circle cx="720" cy="100" r="2"/>
    <circle cx="940" cy="140" r="3"/>
    <circle cx="100" cy="960" r="3"/>
    <circle cx="320" cy="1000" r="2"/>
    <circle cx="560" cy="1020" r="3"/>
    <circle cx="780" cy="980" r="2"/>
    <circle cx="980" cy="960" r="3"/>
  </g>

  <!-- Soft radial glow behind icon -->
  <ellipse cx="540" cy="440" rx="320" ry="320" fill="url(#iconGlow)"/>

  <!-- ═══════════ TOP BADGE ═══════════ -->
  <g transform="translate(540, 130)">
    <!-- Badge background with gold glow -->
    <rect x="-200" y="-38" width="400" height="76" rx="38" fill="rgba(0,0,0,0.2)"/>
    <rect x="-198" y="-36" width="396" height="72" rx="36" fill="url(#goldGrad)"/>

    <!-- Live indicator (pulsing dot) -->
    <circle cx="-150" cy="0" r="10" fill="#ffffff"/>
    <circle cx="-150" cy="0" r="6" fill="#dc2626"/>

    <!-- Badge text -->
    <text x="20" y="12" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#14532d" text-anchor="middle" letter-spacing="6">NOW LIVE 🚀</text>
  </g>

  <!-- ═══════════ MAIN ICON CARD ═══════════ -->
  <g transform="translate(540, 440)" filter="url(#dropShadow)">
    <!-- Outer glow ring -->
    <rect x="-200" y="-200" width="400" height="400" rx="92" fill="rgba(255,255,255,0.08)"/>

    <!-- Main white tile -->
    <rect x="-180" y="-180" width="360" height="360" rx="80" fill="url(#tileGrad)"/>

    <!-- The "N" arrow icon (your exact mark) -->
    <g transform="translate(0, 18)" stroke="#16a34a" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <!-- Left vertical -->
      <line x1="-80" y1="-88" x2="-80" y2="88"/>
      <!-- Diagonal arrow -->
      <line x1="-80" y1="88" x2="80" y2="-88"/>
      <!-- Right vertical -->
      <line x1="80" y1="-88" x2="80" y2="88"/>
      <!-- Arrowhead -->
      <polyline points="32,-88 80,-88 80,-40"/>
    </g>

    <!-- Orange accent dot with white ring -->
    <circle cx="140" cy="-140" r="28" fill="url(#goldGrad)"/>
    <circle cx="140" cy="-140" r="28" fill="none" stroke="rgba(22,163,74,0.3)" stroke-width="4"/>
  </g>

  <!-- ═══════════ BRAND NAME ═══════════ -->
  <text x="540" y="760" font-family="Inter, -apple-system, sans-serif" font-size="148" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-4" filter="url(#textGlow)">Nafaa</text>

  <!-- Underline accent -->
  <line x1="420" y1="785" x2="660" y2="785" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>

  <!-- ═══════════ URDU HOOK (Emotional) ═══════════ -->
  <text x="540" y="855" font-family="'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', serif" font-size="52" fill="#ffffff" text-anchor="middle">آپ کی دکان کا نیا ساتھی</text>

  <!-- ═══════════ ROMAN URDU SUBLINE ═══════════ -->
  <text x="540" y="908" font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="2">Ab har dukandar ka apna POS</text>

  <!-- ═══════════ CTA BUTTON ═══════════ -->
  <g transform="translate(540, 990)">
    <!-- Button shadow -->
    <rect x="-258" y="-46" width="516" height="92" rx="46" fill="rgba(0,0,0,0.25)"/>
    <!-- Button -->
    <rect x="-260" y="-48" width="520" height="92" rx="46" fill="#ffffff"/>
    <!-- Button text -->
    <text x="0" y="16" font-family="Inter, sans-serif" font-size="34" font-weight="900" fill="#15803d" text-anchor="middle" letter-spacing="3">FREE DOWNLOAD →</text>
  </g>

  <!-- ═══════════ FOOTER ═══════════ -->
  <text x="540" y="1058" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="6">🇵🇰  NAFAA.PK</text>
</svg>
