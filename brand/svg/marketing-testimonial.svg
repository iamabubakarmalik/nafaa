<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="testBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf6"/>
      <stop offset="100%" stop-color="#dcfce9"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#testBg)"/>

  <!-- Big quote mark -->
  <text x="120" y="240" font-family="Georgia" font-size="220" font-weight="900" fill="#16a34a" opacity="0.2">"</text>

  <!-- Quote text -->
  <text x="540" y="380" font-family="Inter" font-size="42" font-weight="700" fill="#0f172a" text-anchor="middle">Pehle hum sab kuch register</text>
  <text x="540" y="440" font-family="Inter" font-size="42" font-weight="700" fill="#0f172a" text-anchor="middle">par likhte the. Ab Nafaa pe</text>
  <text x="540" y="500" font-family="Inter" font-size="42" font-weight="700" fill="#0f172a" text-anchor="middle">sab kuch hai. Time bachat,</text>
  <text x="540" y="560" font-family="Inter" font-size="42" font-weight="700" fill="#16a34a" text-anchor="middle">profit barh gaya!</text>

  <!-- Stars -->
  <text x="540" y="650" font-size="40" text-anchor="middle">⭐⭐⭐⭐⭐</text>

  <!-- Person info -->
  <g transform="translate(440, 720)">
    <rect width="200" height="200" rx="100" fill="#16a34a"/>
    <text x="100" y="135" font-size="120" text-anchor="middle">👨‍🍳</text>
  </g>

  <text x="540" y="970" font-family="Inter" font-size="36" font-weight="900" fill="#0f172a" text-anchor="middle">Ahmad Ali</text>
  <text x="540" y="1010" font-family="Inter" font-size="22" font-weight="500" fill="#64748b" text-anchor="middle">Owner, Ahmad Bakery, Lahore</text>
  <text x="540" y="1050" font-family="Inter" font-size="18" font-weight="700" fill="#16a34a" text-anchor="middle">nafaa.pk</text>
</svg>
