<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dy="15"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Brand top -->
  <g transform="translate(540, 200)">
    <g transform="translate(-60, 0)" filter="url(#sh)">
      <rect x="-50" y="-50" width="100" height="100" rx="22" fill="#16a34a"/>
      <g transform="translate(0, 4)" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <line x1="-22" y1="-25" x2="-22" y2="25"/>
        <line x1="-22" y1="25" x2="22" y2="-25"/>
        <line x1="22" y1="-25" x2="22" y2="25"/>
        <polyline points="9,-25 22,-25 22,-12"/>
      </g>
      <circle cx="40" cy="-40" r="7" fill="#f59e0b"/>
    </g>
    <text x="20" y="14" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="#ffffff">Nafaa</text>
  </g>

  <!-- Stars -->
  <text x="540" y="450" font-family="sans-serif" font-size="100" fill="#fbbf24" text-anchor="middle">⭐⭐⭐⭐⭐</text>

  <!-- Quote big -->
  <text x="540" y="650" font-family="Inter, sans-serif" font-size="64" font-weight="900" fill="#ffffff" text-anchor="middle">"Best App"</text>
  <text x="540" y="730" font-family="'Noto Nastaliq Urdu', serif" font-size="56" fill="#fbbf24" text-anchor="middle">بہترین ایپ</text>

  <!-- Testimonial cards -->
  <g transform="translate(540, 950)">
    <g transform="translate(0, 0)">
      <rect x="-420" y="-50" width="840" height="100" rx="20" fill="rgba(255,255,255,0.15)"/>
      <text x="-360" y="14" font-family="sans-serif" font-size="44">👨</text>
      <text x="-280" y="-5" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Ahmad — Kiryana</text>
      <text x="-280" y="30" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#fbbf24">"50 sales pehle din!"</text>
    </g>
    <g transform="translate(0, 140)">
      <rect x="-420" y="-50" width="840" height="100" rx="20" fill="rgba(255,255,255,0.15)"/>
      <text x="-360" y="14" font-family="sans-serif" font-size="44">👨</text>
      <text x="-280" y="-5" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Bilal — Medical</text>
      <text x="-280" y="30" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#fbbf24">"Udhaar yaad rehta hai"</text>
    </g>
    <g transform="translate(0, 280)">
      <rect x="-420" y="-50" width="840" height="100" rx="20" fill="rgba(255,255,255,0.15)"/>
      <text x="-360" y="14" font-family="sans-serif" font-size="44">👨</text>
      <text x="-280" y="-5" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Usman — General</text>
      <text x="-280" y="30" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#fbbf24">"Bilkul free + Urdu!"</text>
    </g>
  </g>

  <!-- CTA -->
  <g transform="translate(540, 1700)">
    <rect x="-300" y="-60" width="600" height="120" rx="60" fill="#fbbf24"/>
    <text x="0" y="20" font-family="Inter, sans-serif" font-size="44" font-weight="900" fill="#5b21b6" text-anchor="middle">JOIN HUNDREDS →</text>
  </g>

  <text x="540" y="1860" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="3">🇵🇰 nafaa.pk</text>
</svg>
