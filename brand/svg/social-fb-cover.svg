<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 624" width="1640" height="624">
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="mainBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="50%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>

    <!-- Radial accent -->
    <radialGradient id="accentGlow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="rgba(251,191,36,0.25)"/>
      <stop offset="100%" stop-color="rgba(251,191,36,0)"/>
    </radialGradient>

    <!-- Icon tile gradient -->
    <linearGradient id="tileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>

    <!-- Gold gradient for "Nafaa" highlight word -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <!-- Drop shadow for icon -->
    <filter id="iconShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dy="15"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1640" height="624" fill="url(#mainBg)"/>
  <rect width="1640" height="624" fill="url(#accentGlow)"/>

  <!-- Decorative pattern dots -->
  <g fill="rgba(255,255,255,0.05)">
    <circle cx="100" cy="80" r="5"/>
    <circle cx="1540" cy="120" r="5"/>
    <circle cx="180" cy="540" r="5"/>
    <circle cx="1480" cy="500" r="5"/>
    <circle cx="60" cy="312" r="3"/>
    <circle cx="1580" cy="312" r="3"/>
    <circle cx="820" cy="40" r="4"/>
    <circle cx="820" cy="584" r="4"/>
  </g>

  <!-- Subtle currency symbols floating in background -->
  <g fill="rgba(255,255,255,0.04)" font-family="Inter, sans-serif" font-weight="900">
    <text x="120" y="180" font-size="80">₨</text>
    <text x="1480" y="450" font-size="80">₨</text>
    <text x="60" y="500" font-size="60">💰</text>
    <text x="1520" y="220" font-size="60">📈</text>
  </g>

  <!-- ═══ LEFT SIDE: ICON ═══ -->
  <g transform="translate(280, 312)" filter="url(#iconShadow)">
    <!-- Outer soft ring -->
    <rect x="-150" y="-150" width="300" height="300" rx="68" fill="rgba(255,255,255,0.15)"/>
    <!-- Inner white tile -->
    <rect x="-128" y="-128" width="256" height="256" rx="58" fill="url(#tileGrad)"/>
    <!-- N with arrow mark -->
    <g transform="translate(0, 12)" stroke="#16a34a" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="-58" y1="-65" x2="-58" y2="65"/>
      <line x1="-58" y1="65" x2="58" y2="-65"/>
      <line x1="58" y1="-65" x2="58" y2="65"/>
      <polyline points="24,-65 58,-65 58,-30"/>
    </g>
    <!-- Orange accent dot -->
    <circle cx="103" cy="-103" r="20" fill="#f59e0b"/>
    <circle cx="103" cy="-103" r="20" fill="none" stroke="rgba(22,163,74,0.3)" stroke-width="3"/>
  </g>

  <!-- ═══ RIGHT SIDE: BRAND + TAGLINE ═══ -->

  <!-- Brand name "Nafaa" with Urdu -->
  <g transform="translate(500, 130)">
    <text font-family="Inter, -apple-system, sans-serif" font-size="130" font-weight="900" fill="#ffffff" letter-spacing="-4">Nafaa</text>
    <!-- Urdu equivalent right after -->
    <text x="380" y="-10" font-family="'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', serif" font-size="80" fill="#fde047">نفع</text>
  </g>

  <!-- Divider line -->
  <line x1="500" y1="180" x2="900" y2="180" stroke="rgba(253,224,71,0.6)" stroke-width="3"/>

  <!-- MAIN TAGLINE — English (gold highlight on "Nafaa" words) -->
  <g transform="translate(500, 250)">
    <text font-family="Inter, sans-serif" font-size="56" font-weight="800" fill="#ffffff">
      <tspan fill="url(#goldGrad)" font-weight="900">Nafaa</tspan>
      <tspan fill="#ffffff"> App se </tspan>
      <tspan fill="url(#goldGrad)" font-weight="900">Nafaa</tspan>
      <tspan fill="#ffffff"> Kamayen</tspan>
    </text>
  </g>

  <!-- Urdu tagline -->
  <g transform="translate(500, 340)">
    <text font-family="'Noto Nastaliq Urdu', serif" font-size="56" fill="#ffffff">
      <tspan fill="#fde047">نفع</tspan>
      <tspan fill="#ffffff"> ایپ سے </tspan>
      <tspan fill="#fde047">نفع</tspan>
      <tspan fill="#ffffff"> کمائیں</tspan>
    </text>
  </g>

  <!-- Sub-tagline pills -->
  <g transform="translate(500, 440)">
    <g transform="translate(0, 0)">
      <rect x="0" y="-26" width="170" height="52" rx="26" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <text x="85" y="8" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">💰 POS</text>
    </g>
    <g transform="translate(185, 0)">
      <rect x="0" y="-26" width="180" height="52" rx="26" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <text x="90" y="8" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">📒 Khata</text>
    </g>
    <g transform="translate(380, 0)">
      <rect x="0" y="-26" width="170" height="52" rx="26" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <text x="85" y="8" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">📦 Stock</text>
    </g>
    <g transform="translate(565, 0)">
      <rect x="0" y="-26" width="220" height="52" rx="26" fill="url(#goldGrad)"/>
      <text x="110" y="8" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#15803d" text-anchor="middle">FREE 🎉</text>
    </g>
  </g>

  <!-- ═══ BOTTOM BAR ═══ -->
  <g transform="translate(500, 540)">
    <!-- Pakistan flag indicator -->
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="2">🇵🇰 MADE IN PAKISTAN</text>
    <!-- Dot separator -->
    <circle cx="340" cy="-6" r="3" fill="rgba(255,255,255,0.5)"/>
    <!-- Website -->
    <text x="360" y="0" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#fde047" letter-spacing="2">🌐 nafaa.pk</text>
  </g>

  <!-- Top-right corner badge -->
  <g transform="translate(1500, 70)">
    <rect x="-110" y="-26" width="220" height="52" rx="26" fill="#fde047"/>
    <text x="0" y="8" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#15803d" text-anchor="middle" letter-spacing="2">🚀 NOW LIVE</text>
  </g>
</svg>
