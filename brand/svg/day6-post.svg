<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Nafaa logo top -->
  <g transform="translate(120, 110)" filter="url(#sh)">
    <rect x="-50" y="-50" width="100" height="100" rx="22" fill="#ffffff"/>
    <g transform="translate(0, 4)" stroke="#10b981" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="-22" y1="-25" x2="-22" y2="25"/>
      <line x1="-22" y1="25" x2="22" y2="-25"/>
      <line x1="22" y1="-25" x2="22" y2="25"/>
      <polyline points="9,-25 22,-25 22,-12"/>
    </g>
    <circle cx="40" cy="-40" r="7" fill="#f59e0b"/>
  </g>
  <text x="200" y="120" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#ffffff">Nafaa</text>
  <text x="200" y="148" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#fbbf24" letter-spacing="2">DUKAN POS APP</text>

  <!-- Headline -->
  <text x="540" y="240" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#ffffff" text-anchor="middle">PEHLE vs AB</text>
  <text x="540" y="295" font-family="'Noto Nastaliq Urdu', serif" font-size="44" fill="#fbbf24" text-anchor="middle">پہلے اور اب کا فرق</text>

  <!-- BEFORE card -->
  <g transform="translate(280, 540)" filter="url(#sh)">
    <rect x="-180" y="-180" width="360" height="360" rx="30" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="0" y="-110" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#991b1b" text-anchor="middle">😩 PEHLE</text>
    <text x="0" y="-30" font-family="sans-serif" font-size="80" text-anchor="middle">📋</text>
    <text x="0" y="40" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#7f1d1d" text-anchor="middle">Register book</text>
    <text x="0" y="75" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#7f1d1d" text-anchor="middle">Galat hisaab</text>
    <text x="0" y="110" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#7f1d1d" text-anchor="middle">Udhaar bhool</text>
    <text x="0" y="150" font-family="'Noto Nastaliq Urdu', serif" font-size="24" fill="#991b1b" text-anchor="middle">پرانا طریقہ</text>
  </g>

  <!-- Arrow between -->
  <text x="540" y="560" font-family="sans-serif" font-size="80" fill="#fbbf24" text-anchor="middle">→</text>

  <!-- AFTER card -->
  <g transform="translate(800, 540)" filter="url(#sh)">
    <rect x="-180" y="-180" width="360" height="360" rx="30" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="0" y="-110" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#14532d" text-anchor="middle">😎 AB</text>
    <text x="0" y="-30" font-family="sans-serif" font-size="80" text-anchor="middle">📱</text>
    <text x="0" y="40" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#14532d" text-anchor="middle">Nafaa App</text>
    <text x="0" y="75" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#14532d" text-anchor="middle">Sahi hisaab</text>
    <text x="0" y="110" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#14532d" text-anchor="middle">Sab yaad</text>
    <text x="0" y="150" font-family="'Noto Nastaliq Urdu', serif" font-size="24" fill="#14532d" text-anchor="middle">سمارٹ طریقہ</text>
  </g>

  <!-- Hook below -->
  <text x="540" y="840" font-family="Inter, sans-serif" font-size="40" font-weight="800" fill="#ffffff" text-anchor="middle">Aap kab tabdeel honge?</text>
  <text x="540" y="890" font-family="'Noto Nastaliq Urdu', serif" font-size="40" fill="#fbbf24" text-anchor="middle">آپ کب بدلیں گے؟</text>

  <!-- CTA -->
  <g transform="translate(540, 980)">
    <rect x="-260" y="-44" width="520" height="88" rx="44" fill="#fbbf24"/>
    <text x="0" y="14" font-family="Inter, sans-serif" font-size="34" font-weight="900" fill="#047857" text-anchor="middle" letter-spacing="2">UPGRADE NOW →</text>
  </g>

  <text x="540" y="1050" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="3">🇵🇰 nafaa.pk</text>
</svg>
