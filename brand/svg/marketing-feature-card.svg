<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <rect width="1200" height="675" fill="#f8fafc"/>

  <!-- Left: feature image area -->
  <g transform="translate(60, 60)">
    <rect width="540" height="555" rx="32" fill="#16a34a"/>

    <g transform="translate(270, 200)">
      <text font-size="200" text-anchor="middle">⚡</text>
    </g>

    <text x="270" y="450" font-family="Inter" font-size="48" font-weight="900" fill="#ffffff" text-anchor="middle">5 Sec POS</text>
    <text x="270" y="490" font-family="Inter" font-size="20" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle">Fastest in Pakistan</text>
  </g>

  <!-- Right: text + CTA -->
  <g transform="translate(660, 80)">
    <text font-family="Inter" font-size="16" font-weight="800" fill="#16a34a" letter-spacing="2">⚡ FEATURE SPOTLIGHT</text>
    <text y="60" font-family="Inter" font-size="48" font-weight="900" fill="#0f172a">Lightning Fast</text>
    <text y="115" font-family="Inter" font-size="48" font-weight="900" fill="#16a34a">POS Counter</text>

    <text y="200" font-family="Inter" font-size="20" font-weight="500" fill="#475569">Process sales in under 5 seconds.</text>
    <text y="230" font-family="Inter" font-size="20" font-weight="500" fill="#475569">Barcode scan, multiple payments,</text>
    <text y="260" font-family="Inter" font-size="20" font-weight="500" fill="#475569">and instant WhatsApp receipts.</text>

    <!-- Checklist -->
    <g transform="translate(0, 320)" font-family="Inter" font-size="18" font-weight="600" fill="#0f172a">
      <text>✅ Camera barcode scanner</text>
      <text y="35">✅ Cash, Card, JazzCash, EasyPaisa</text>
      <text y="70">✅ WhatsApp receipts to customer</text>
      <text y="105">✅ Works offline</text>
    </g>

    <!-- CTA -->
    <g transform="translate(0, 480)">
      <rect width="280" height="64" rx="32" fill="#16a34a"/>
      <text x="140" y="42" font-family="Inter" font-size="20" font-weight="800" fill="#ffffff" text-anchor="middle">Try Free → nafaa.pk</text>
    </g>
