<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#iconBg)"/>

  <!-- White "N with arrow" stroke (your exact mark) -->
  <g transform="translate(512, 540)" stroke="#ffffff" stroke-width="90" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left vertical of N -->
    <line x1="-200" y1="-220" x2="-200" y2="220"/>
    <!-- Diagonal arrow (bottom-left to top-right) -->
    <line x1="-200" y1="220" x2="200" y2="-220"/>
    <!-- Right vertical of N -->
    <line x1="200" y1="-220" x2="200" y2="220"/>
    <!-- Arrowhead -->
    <polyline points="80,-220 200,-220 200,-100"/>
  </g>

  <!-- Orange accent dot (top-right) -->
  <circle cx="780" cy="244" r="62" fill="#f59e0b"/>
</svg>
