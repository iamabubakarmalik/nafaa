<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feOffset dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Top badge -->
  <g transform="translate(540, 130)">
    <rect x="-180" y="-32" width="360" height="64" rx="32" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <text x="0" y="10" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="4">🚀 NOW LIVE</text>
  </g>

  <!-- Icon card (your original) -->
  <g transform="translate(540, 400)" filter="url(#sh)">
    <rect x="-160" y="-160" width="320" height="320" rx="70" fill="#ffffff"/>
    <g transform="translate(0, 14)" stroke="#16a34a" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="-70" y1="-78" x2="-70" y2="78"/>
      <line x1="-70" y1="78" x2="70" y2="-78"/>
      <line x1="70" y1="-78" x2="70" y2="78"/>
      <polyline points="28,-78 70,-78 70,-36"/>
    </g>
    <circle cx="125" cy="-125" r="22" fill="#f59e0b"/>
  </g>

  <!-- Headline -->
  <text x="540" y="700" font-family="Inter, sans-serif" font-size="130" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-3">Nafaa</text>

  <!-- Sales hook (Urdu — emotional + direct) -->
  <text x="540" y="790" font-family="'Noto Nastaliq Urdu', serif" font-size="48" fill="#ffffff" text-anchor="middle">آپ کی دکان کا نیا ساتھی</text>

  <!-- Subline (Roman Urdu — relatable) -->
  <text x="540" y="850" font-family="Inter, sans-serif" font-size="32" font-weight="600" fill="rgba(255,255,255,0.95)" text-anchor="middle">Ab har dukandar ka apna POS</text>

  <!-- CTA button -->
  <g transform="translate(540, 950)">
    <rect x="-240" y="-44" width="480" height="88" rx="44" fill="#ffffff"/>
    <text x="0" y="14" font-family="Inter, sans-serif" font-size="34" font-weight="900" fill="#15803d" text-anchor="middle" letter-spacing="2">DOWNLOAD FREE →</text>
  </g>

  <!-- Footer -->
  <text x="540" y="1030" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="3">🇵🇰  nafaa.pk</text>
</svg>
