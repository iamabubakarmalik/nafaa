      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="splashIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcfce9"/>
    </linearGradient>
  </defs>

  <rect width="1284" height="2778" fill="url(#splashBg)"/>

  <!-- Center icon -->
  <g transform="translate(642, 1389)">
    <rect x="-180" y="-180" width="360" height="360" rx="80" ry="80" fill="rgba(255,255,255,0.15)"/>
    <rect x="-160" y="-160" width="320" height="320" rx="72" ry="72" fill="url(#splashIcon)"/>
    <g transform="translate(0, 12)" stroke="#16a34a" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none">
