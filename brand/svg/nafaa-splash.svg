    </g>
    <circle cx="120" cy="-130" r="20" fill="#f59e0b"/>
  </g>

  <!-- Tagline -->
  <text x="642" y="1700" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="900" fill="#ffffff" text-anchor="middle">
