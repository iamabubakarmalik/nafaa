<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Nafaa logo (top-left, small but visible) -->
  <g transform="translate(120, 110)" filter="url(#sh)">
    <rect x="-50" y="-50" width="100" height="100" rx="22" fill="#16a34a"/>
    <g transform="translate(0, 4)" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="-22" y1="-25" x2="-22" y2="25"/>
      <line x1="-22" y1="25" x2="22" y2="-25"/>
      <line x1="22" y1="-25" x2="22" y2="25"/>
      <polyline points="9,-25 22,-25 22,-12"/>
    </g>
    <circle cx="40" cy="-40" r="7" fill="#f59e0b"/>
  </g>
  <text x="200" y="120" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#15803d">Nafaa</text>
  <text x="200" y="148" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#92400e" letter-spacing="2">DUKAN POS APP</text>

  <!-- Headline -->
  <text x="540" y="260" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#78350f" text-anchor="middle">😩 KYA YEH AAP HAIN?</text>
  <text x="540" y="310" font-family="'Noto Nastaliq Urdu', serif" font-size="40" fill="#92400e" text-anchor="middle">کیا یہ آپ ہیں؟</text>

  <!-- Problem 1 -->
  <g transform="translate(540, 420)">
    <rect x="-440" y="-50" width="880" height="100" rx="20" fill="#ffffff" stroke="#fcd34d" stroke-width="3"/>
    <text x="-390" y="20" font-family="sans-serif" font-size="44">❌</text>
    <text x="-320" y="-5" font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#78350f">Register pe ginti karte raat ho jati</text>
    <text x="-320" y="35" font-family="'Noto Nastaliq Urdu', serif" font-size="24" fill="#a16207">رجسٹر پر گنتی، رات بھر</text>
  </g>

  <!-- Problem 2 -->
  <g transform="translate(540, 550)">
    <rect x="-440" y="-50" width="880" height="100" rx="20" fill="#ffffff" stroke="#fcd34d" stroke-width="3"/>
    <text x="-390" y="20" font-family="sans-serif" font-size="44">❌</text>
    <text x="-320" y="-5" font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#78350f">Udhaar yaad nahi, paisa doob jata</text>
    <text x="-320" y="35" font-family="'Noto Nastaliq Urdu', serif" font-size="24" fill="#a16207">ادھار بھول جاتے، پیسہ ضائع</text>
  </g>

  <!-- Problem 3 -->
  <g transform="translate(540, 680)">
    <rect x="-440" y="-50" width="880" height="100" rx="20" fill="#ffffff" stroke="#fcd34d" stroke-width="3"/>
    <text x="-390" y="20" font-family="sans-serif" font-size="44">❌</text>
    <text x="-320" y="-5" font-family="Inter, sans-serif" font-size="30" font-weight="700" fill="#78350f">Stock khatam, customer wapis chala</text>
    <text x="-320" y="35" font-family="'Noto Nastaliq Urdu', serif" font-size="24" fill="#a16207">سٹاک ختم، گاہک واپس</text>
  </g>

  <!-- Arrow -->
  <text x="540" y="800" font-family="sans-serif" font-size="60" text-anchor="middle">⬇️</text>

  <!-- Solution -->
  <g transform="translate(540, 920)">
    <rect x="-440" y="-80" width="880" height="160" rx="30" fill="#16a34a"/>
    <text x="0" y="-18" font-family="Inter, sans-serif" font-size="42" font-weight="900" fill="#ffffff" text-anchor="middle">Nafaa Sab Solve Karta Hai</text>
    <text x="0" y="32" font-family="'Noto Nastaliq Urdu', serif" font-size="34" fill="#fef3c7" text-anchor="middle">سب کا حل — مفت ڈاؤن لوڈ</text>
  </g>

  <!-- Footer -->
  <text x="540" y="1040" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#78350f" text-anchor="middle" letter-spacing="3">🇵🇰 nafaa.pk</text>
</svg>
