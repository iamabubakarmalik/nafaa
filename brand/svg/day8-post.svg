<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Nafaa logo -->
  <g transform="translate(120, 110)" filter="url(#sh)">
    <rect x="-50" y="-50" width="100" height="100" rx="22" fill="#16a34a"/>
    <g transform="translate(0, 4)" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="-22" y1="-25" x2="-22" y2="25"/>
      <line x1="-22" y1="25" x2="22" y2="-25"/>
      <line x1="22" y1="-25" x2="22" y2="25"/>
      <polyline points="9,-25 22,-25 22,-12"/>
    </g>
    <circle cx="40" cy="-40" r="7" fill="#f59e0b"/>
  </g>
  <text x="200" y="120" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#ffffff">Nafaa</text>
  <text x="200" y="148" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#fbbf24" letter-spacing="2">DUKAN POS APP</text>

  <!-- Feature spotlight badge -->
  <g transform="translate(540, 260)">
    <rect x="-200" y="-30" width="400" height="60" rx="30" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <text x="0" y="10" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="3">📒 FEATURE SPOTLIGHT</text>
  </g>

  <!-- Main feature -->
  <text x="540" y="400" font-family="Inter, sans-serif" font-size="96" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2">KHATA</text>
  <text x="540" y="470" font-family="'Noto Nastaliq Urdu', serif" font-size="64" fill="#fbbf24" text-anchor="middle">خاتہ / ادھار</text>

  <!-- Feature card -->
  <g transform="translate(540, 700)" filter="url(#sh)">
    <rect x="-440" y="-160" width="880" height="320" rx="30" fill="#ffffff"/>

    <!-- Icon row -->
    <text x="-340" y="-80" font-family="sans-serif" font-size="80" text-anchor="middle">💰</text>
    <text x="0" y="-95" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#0f766e" text-anchor="middle">Har Udhaar Yaad</text>
    <text x="0" y="-55" font-family="'Noto Nastaliq Urdu', serif" font-size="28" fill="#134e4a" text-anchor="middle">ہر ادھار محفوظ</text>

    <!-- Divider -->
    <line x1="-380" y1="0" x2="380" y2="0" stroke="#a7f3d0" stroke-width="2"/>

    <!-- Benefits -->
    <text x="-340" y="50" font-family="sans-serif" font-size="32">✓</text>
    <text x="-300" y="55" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#134e4a">Customer-wise tracking</text>

    <text x="-340" y="100" font-family="sans-serif" font-size="32">✓</text>
    <text x="-300" y="105" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#134e4a">WhatsApp reminders auto</text>

    <text x="-340" y="150" font-family="sans-serif" font-size="32">✓</text>
    <text x="-300" y="155" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#134e4a">Paisa wapis aata hai</text>
  </g>

  <!-- Bottom hook -->
  <text x="540" y="930" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#ffffff" text-anchor="middle">Ab udhaar nahi doobega!</text>

  <!-- CTA -->
  <g transform="translate(540, 1000)">
    <rect x="-260" y="-30" width="520" height="60" rx="30" fill="#fbbf24"/>
    <text x="0" y="10" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#0f766e" text-anchor="middle" letter-spacing="2">TRY KHATA FREE →</text>
  </g>

  <text x="540" y="1055" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="3">🇵🇰 nafaa.pk</text>
</svg>
