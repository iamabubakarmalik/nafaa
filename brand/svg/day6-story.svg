<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <filter id="sh" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dy="15"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>

  <!-- Brand -->
  <g transform="translate(540, 180)">
    <g transform="translate(-60, 0)" filter="url(#sh)">
      <rect x="-50" y="-50" width="100" height="100" rx="22" fill="#ffffff"/>
      <g transform="translate(0, 4)" stroke="#10b981" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <line x1="-22" y1="-25" x2="-22" y2="25"/>
        <line x1="-22" y1="25" x2="22" y2="-25"/>
        <line x1="22" y1="-25" x2="22" y2="25"/>
        <polyline points="9,-25 22,-25 22,-12"/>
      </g>
      <circle cx="40" cy="-40" r="7" fill="#f59e0b"/>
    </g>
    <text x="20" y="14" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="#ffffff">Nafaa</text>
  </g>

  <!-- Headline -->
  <text x="540" y="370" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle">TRANSFORM</text>
  <text x="540" y="450" font-family="'Noto Nastaliq Urdu', serif" font-size="56" fill="#fbbf24" text-anchor="middle">دکان کی تبدیلی</text>

  <!-- BEFORE -->
  <g transform="translate(540, 700)" filter="url(#sh)">
    <rect x="-380" y="-150" width="760" height="300" rx="30" fill="#fee2e2"/>
    <text x="0" y="-80" font-family="Inter, sans-serif" font-size="44" font-weight="900" fill="#991b1b" text-anchor="middle">😩 PEHLE</text>
    <text x="-200" y="-10" font-family="sans-serif" font-size="80">📋</text>
    <text x="60" y="-30" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#7f1d1d">Register book</text>
    <text x="60" y="20" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#7f1d1d">Galat hisaab</text>
    <text x="60" y="70" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#7f1d1d">Udhaar bhool</text>
  </g>

  <!-- Arrow -->
  <text x="540" y="940" font-family="sans-serif" font-size="80" fill="#fbbf24" text-anchor="middle">⬇️</text>

  <!-- AFTER -->
  <g transform="translate(540, 1180)" filter="url(#sh)">
    <rect x="-380" y="-150" width="760" height="300" rx="30" fill="#dcfce7"/>
    <text x="0" y="-80" font-family="Inter, sans-serif" font-size="44" font-weight="900" fill="#14532d" text-anchor="middle">😎 AB</text>
    <text x="-200" y="-10" font-family="sans-serif" font-size="80">📱</text>
    <text x="60" y="-30" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#14532d">Nafaa app</text>
    <text x="60" y="20" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#14532d">Auto hisaab</text>
    <text x="60" y="70" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#14532d">Sab yaad</text>
  </g>

  <!-- Hook -->
  <text x="540" y="1490" font-family="Inter, sans-serif" font-size="44" font-weight="800" fill="#ffffff" text-anchor="middle">Tabdeeli aapke haath mein</text>
  <text x="540" y="1550" font-family="'Noto Nastaliq Urdu', serif" font-size="42" fill="#fbbf24" text-anchor="middle">تبدیلی آپ کے ہاتھ میں</text>

  <!-- CTA -->
  <g transform="translate(540, 1700)">
    <rect x="-300" y="-60" width="600" height="120" rx="60" fill="#fbbf24"/>
    <text x="0" y="20" font-family="Inter, sans-serif" font-size="44" font-weight="900" fill="#065f46" text-anchor="middle">UPGRADE NOW →</text>
  </g>

  <text x="540" y="1860" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="3">🇵🇰 nafaa.pk</text>
</svg>
