<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dy="15"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bgGrad)"/>

  <!-- Decorative dots -->
  <g fill="rgba(255,255,255,0.08)">
    <circle cx="100" cy="150" r="5"/>
    <circle cx="980" cy="200" r="5"/>
    <circle cx="150" cy="950" r="5"/>
    <circle cx="950" cy="900" r="5"/>
  </g>

  <!-- Top badge -->
  <g transform="translate(540, 110)">
    <rect x="-180" y="-30" width="360" height="60" rx="30" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="0" y="10" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="3">🚀 NOW LIVE</text>
  </g>

  <!-- Center icon tile -->
  <g transform="translate(540, 380)" filter="url(#shadow)">
    <rect x="-140" y="-140" width="280" height="280" rx="64" fill="url(#tile)"/>
    <g transform="translate(0, 0)" stroke="#16a34a" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="-58" y1="-65" x2="-58" y2="65"/>
      <line x1="-58" y1="65" x2="58" y2="-65"/>
      <line x1="58" y1="-65" x2="58" y2="65"/>
      <polyline points="26,-65 58,-65 58,-33"/>
    </g>
    <circle cx="110" cy="-110" r="18" fill="#fbbf24"/>
  </g>

  <!-- Main title -->
  <text x="540" y="680" font-family="Inter, sans-serif" font-size="120" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-3">Nafaa</text>

  <!-- Subtitle -->
  <text x="540" y="740" font-family="Inter, sans-serif" font-size="32" font-weight="600" fill="rgba(255,255,255,0.95)" text-anchor="middle" letter-spacing="4">PAKISTAN'S SMART POS</text>

  <!-- Urdu line -->
  <text x="540" y="810" font-family="'Noto Nastaliq Urdu', serif" font-size="44" fill="rgba(255,255,255,0.95)" text-anchor="middle">اپنی دکان سمارٹ طریقے سے چلائیں</text>

  <!-- Feature pills -->
  <g transform="translate(540, 900)">
    <g transform="translate(-260, 0)">
      <rect x="-90" y="-25" width="180" height="50" rx="25" fill="rgba(255,255,255,0.18)"/>
      <text x="0" y="8" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">💰 POS</text>
    </g>
    <g transform="translate(0, 0)">
      <rect x="-90" y="-25" width="180" height="50" rx="25" fill="rgba(255,255,255,0.18)"/>
      <text x="0" y="8" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">📦 Stock</text>
    </g>
    <g transform="translate(260, 0)">
      <rect x="-90" y="-25" width="180" height="50" rx="25" fill="rgba(255,255,255,0.18)"/>
      <text x="0" y="8" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">📒 Khata</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="540" y="1010" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="2">🇵🇰  nafaa.pk</text>
</svg>
