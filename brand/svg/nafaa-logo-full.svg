<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <!-- Icon (left side) -->
  <g transform="translate(40, 80)">
    <rect width="240" height="240" rx="54" ry="54" fill="url(#iconBg)"/>
    <g transform="translate(120, 120)" stroke="#ffffff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="-50" y1="-55" x2="-50" y2="55"/>
      <line x1="-50" y1="55" x2="50" y2="-55"/>
      <line x1="50" y1="-55" x2="50" y2="55"/>
      <polyline points="22,-55 50,-55 50,-27"/>
    </g>
    <circle cx="195" cy="50" r="14" fill="#fbbf24"/>
  </g>

  <!-- Wordmark "Nafaa" -->
  <text x="320" y="225" font-family="Inter, -apple-system, sans-serif" font-size="160" font-weight="900" fill="#15803d" letter-spacing="-4">Nafaa</text>

  <!-- Tagline -->
  <text x="324" y="285" font-family="Inter, sans-serif" font-size="32" font-weight="500" fill="#16a34a" letter-spacing="3">RUN YOUR SHOP SMARTER</text>

  <!-- Urdu tagline -->
  <text x="324" y="335" font-family="'Noto Nastaliq Urdu', serif" font-size="36" fill="#15803d">اپنی دکان سمارٹ طریقے سے چلائیں</text>
</svg>
