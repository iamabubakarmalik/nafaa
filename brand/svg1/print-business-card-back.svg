    <text x="90" y="125" font-family="Inter" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">nafaa.pk</text>
  </g>
  <text x="890" y="450" font-family="Inter" font-size="14" font-weight="600" fill="#64748b" text-anchor="middle">Scan to visit</text>
