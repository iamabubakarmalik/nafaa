<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600">
  <rect width="1050" height="600" fill="#ffffff"/>

  <!-- Side accent -->
  <rect width="20" height="600" fill="#16a34a"/>

  <g transform="translate(80, 80)">
    <rect width="60" height="60" rx="14" fill="#16a34a"/>
    <g transform="translate(30, 31)" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="-13" y1="-13" x2="-13" y2="13"/>
      <line x1="-13" y1="13" x2="13" y2="-13"/>
      <line x1="13" y1="-13" x2="13" y2="13"/>
      <polyline points="6,-13 13,-13 13,-6"/>
    </g>
    <circle cx="46" cy="14" r="4" fill="#f59e0b"/>
  </g>

  <text x="160" y="120" font-family="Inter" font-size="38" font-weight="900" fill="#0f172a">Abubakar Malik</text>
  <text x="160" y="155" font-family="Inter" font-size="18" font-weight="600" fill="#16a34a">Founder & CEO</text>

  <g transform="translate(80, 240)" font-family="Inter" font-size="22" fill="#0f172a">
    <text font-weight="600">📧 abubakar@nafaa.pk</text>
