<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="appBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#appBg)"/>

  <!-- Phone mockup left -->
  <g transform="translate(80, 90)">
    <rect width="280" height="450" rx="32" fill="#0f172a" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
    <rect x="12" y="12" width="256" height="426" rx="22" fill="#ffffff"/>

    <!-- Mock POS screen -->
    <rect x="24" y="40" width="232" height="50" rx="8" fill="#16a34a"/>
    <text x="140" y="72" font-family="Inter" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Today's Sales: Rs 142,580</text>

    <rect x="24" y="105" width="110" height="80" rx="8" fill="#dcfce9"/>
    <text x="79" y="150" font-size="28" text-anchor="middle">📦</text>
    <rect x="146" y="105" width="110" height="80" rx="8" fill="#fef3c7"/>
    <text x="201" y="150" font-size="28" text-anchor="middle">💰</text>

    <rect x="24" y="200" width="232" height="40" rx="6" fill="#f1f5f9"/>
    <rect x="24" y="250" width="232" height="40" rx="6" fill="#f1f5f9"/>
    <rect x="24" y="300" width="232" height="40" rx="6" fill="#f1f5f9"/>

    <rect x="24" y="370" width="232" height="50" rx="10" fill="#16a34a"/>
    <text x="140" y="402" font-family="Inter" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">+ New Sale</text>
  </g>

  <!-- Right text -->
  <g transform="translate(420, 130)">
    <text font-family="Inter" font-size="20" font-weight="800" fill="#fbbf24" letter-spacing="3">📱 NAFAA MOBILE APP</text>
    <text y="80" font-family="Inter" font-size="60" font-weight="900" fill="#ffffff">Run Your Shop</text>
    <text y="150" font-family="Inter" font-size="60" font-weight="900" fill="#fbbf24">From Your Phone</text>

    <text y="230" font-family="Inter" font-size="22" font-weight="500" fill="rgba(255,255,255,0.9)">Complete POS, inventory, customers,</text>
    <text y="260" font-family="Inter" font-size="22" font-weight="500" fill="rgba(255,255,255,0.9)">and reports in your pocket.</text>

    <g y="320" font-family="Inter" font-size="20" font-weight="700" fill="#ffffff">
      <text y="320">📷 Barcode scanner</text>
      <text y="360">💬 WhatsApp receipts</text>
      <text y="400">🔒 Biometric login</text>
    </g>
  </g>
</svg>
