<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0f172a"/>

  <text x="600" y="80" font-family="Inter" font-size="22" font-weight="800" fill="#22c55e" text-anchor="middle" letter-spacing="4">TRUSTED BY PAKISTAN</text>

  <!-- Big stats grid -->
  <g transform="translate(60, 130)">
    <g>
      <text x="135" y="100" font-family="Inter" font-size="100" font-weight="900" fill="#fbbf24" text-anchor="middle">5K+</text>
      <text x="135" y="140" font-family="Inter" font-size="20" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Active Shops</text>
    </g>
    <g transform="translate(270, 0)">
      <text x="135" y="100" font-family="Inter" font-size="100" font-weight="900" fill="#22c55e" text-anchor="middle">500K+</text>
      <text x="135" y="140" font-family="Inter" font-size="20" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Daily Transactions</text>
    </g>
    <g transform="translate(540, 0)">
      <text x="135" y="100" font-family="Inter" font-size="100" font-weight="900" fill="#fbbf24" text-anchor="middle">5B+</text>
      <text x="135" y="140" font-family="Inter" font-size="20" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Rs. Sales Processed</text>
    </g>
    <g transform="translate(810, 0)">
      <text x="135" y="100" font-family="Inter" font-size="100" font-weight="900" fill="#22c55e" text-anchor="middle">99.9%</text>
      <text x="135" y="140" font-family="Inter" font-size="20" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Uptime SLA</text>
    </g>
  </g>

  <!-- Cities -->
  <text x="600" y="370" font-family="Inter" font-size="24" font-weight="600" fill="rgba(255,255,255,0.85)" text-anchor="middle">From Karachi to Khyber — 50+ Pakistani Cities</text>

  <!-- Logo + CTA -->
  <g transform="translate(440, 440)">
    <rect width="80" height="80" rx="18" fill="#16a34a"/>
    <g transform="translate(40, 41)" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="-16" y1="-16" x2="-16" y2="16"/>
      <line x1="-16" y1="16" x2="16" y2="-16"/>
      <line x1="16" y1="-16" x2="16" y2="16"/>
      <polyline points="7,-16 16,-16 16,-7"/>
    </g>
    <circle cx="62" cy="18" r="5" fill="#f59e0b"/>
    <text x="100" y="50" font-family="Inter" font-size="36" font-weight="900" fill="#ffffff">Nafaa</text>
  </g>

  <text x="600" y="580" font-family="Inter" font-size="22" font-weight="700" fill="#fbbf24" text-anchor="middle">Join us → nafaa.pk</text>
