<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="40"/>
      <feOffset dx="0" dy="30"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1290" height="2796" fill="url(#bg1)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="200" r="180" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1200" cy="500" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="150" cy="2500" r="200" fill="rgba(255,255,255,0.04)"/>

  <!-- Headline -->
  <text x="645" y="220" font-family="Inter, sans-serif" font-size="78" font-weight="900" fill="#ffffff" text-anchor="middle">Aap Ki Dukaan</text>
  <text x="645" y="320" font-family="Inter, sans-serif" font-size="78" font-weight="900" fill="#fbbf24" text-anchor="middle">Aap Ki Jeb Mein</text>
  <text x="645" y="400" font-family="Inter, sans-serif" font-size="38" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">Real-time sales tracking with smart analytics</text>

  <!-- iPhone Frame -->
  <g transform="translate(195, 530)" filter="url(#shadow1)">
    <!-- Phone outer body -->
    <rect x="0" y="0" width="900" height="1900" rx="90" ry="90" fill="#1a1a1a"/>
    <rect x="15" y="15" width="870" height="1870" rx="78" ry="78" fill="#000000"/>
    <!-- Screen -->
    <rect x="30" y="30" width="840" height="1840" rx="68" ry="68" fill="#f9fafb"/>

    <!-- Notch -->
    <rect x="350" y="50" width="200" height="40" rx="20" ry="20" fill="#000000"/>

    <!-- Status Bar -->
    <text x="80" y="125" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#000000">9:41</text>
    <g transform="translate(740, 105)">
      <rect x="0" y="0" width="50" height="22" rx="4" ry="4" fill="none" stroke="#000" stroke-width="2"/>
      <rect x="3" y="3" width="40" height="16" rx="2" ry="2" fill="#000"/>
    </g>

    <!-- Header -->
    <text x="80" y="220" font-family="Inter, sans-serif" font-size="32" font-weight="500" fill="#737373">Good Morning,</text>
    <text x="80" y="280" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="#111827">Ahmad Khan 👋</text>
    <text x="80" y="325" font-family="Inter, sans-serif" font-size="26" font-weight="500" fill="#9ca3af">Ahmad Kiryana Store</text>

    <!-- Big Sales Card -->
    <rect x="60" y="370" width="780" height="380" rx="40" ry="40" fill="url(#card1)"/>
    <text x="100" y="450" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.85)">AAJ KI SALES</text>
    <text x="100" y="560" font-family="Inter, sans-serif" font-size="120" font-weight="900" fill="#ffffff">Rs 64,500</text>
    <g transform="translate(100, 600)">
      <rect x="0" y="0" width="220" height="50" rx="25" ry="25" fill="rgba(255,255,255,0.25)"/>
      <text x="110" y="34" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">↗ +24.5% vs kal</text>
    </g>
    <text x="100" y="720" font-family="Inter, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.9)">📊 42 orders  •  💰 Profit: Rs 18,200</text>

    <!-- Quick Stats Grid -->
    <g transform="translate(60, 800)">
      <!-- Stat 1 -->
      <rect x="0" y="0" width="370" height="220" rx="32" ry="32" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
      <circle cx="60" cy="60" r="35" fill="#dbeafe"/>
      <text x="60" y="75" font-family="Inter, sans-serif" font-size="36" text-anchor="middle">📦</text>
      <text x="40" y="135" font-family="Inter, sans-serif" font-size="26" font-weight="600" fill="#737373">Products</text>
      <text x="40" y="190" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#111827">1,547</text>

      <!-- Stat 2 -->
      <rect x="410" y="0" width="370" height="220" rx="32" ry="32" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
      <circle cx="470" cy="60" r="35" fill="#fef3c7"/>
      <text x="470" y="75" font-family="Inter, sans-serif" font-size="36" text-anchor="middle">👥</text>
      <text x="450" y="135" font-family="Inter, sans-serif" font-size="26" font-weight="600" fill="#737373">Customers</text>
      <text x="450" y="190" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#111827">328</text>
    </g>

    <!-- 7-Day Trend Chart -->
    <g transform="translate(60, 1060)">
      <rect x="0" y="0" width="780" height="320" rx="32" ry="32" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
      <text x="30" y="60" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#111827">7-Day Sales Trend</text>
      <text x="30" y="100" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#22c55e">↗ Trending up</text>

      <!-- Chart bars -->
      <g transform="translate(30, 140)">
        <rect x="0" y="80" width="80" height="120" rx="12" ry="12" fill="#86efac"/>
        <rect x="100" y="50" width="80" height="150" rx="12" ry="12" fill="#4ade80"/>
        <rect x="200" y="100" width="80" height="100" rx="12" ry="12" fill="#86efac"/>
        <rect x="300" y="20" width="80" height="180" rx="12" ry="12" fill="#22c55e"/>
        <rect x="400" y="60" width="80" height="140" rx="12" ry="12" fill="#4ade80"/>
        <rect x="500" y="10" width="80" height="190" rx="12" ry="12" fill="#16a34a"/>
        <rect x="600" y="0" width="80" height="200" rx="12" ry="12" fill="#15803d"/>
      </g>
      <g transform="translate(30, 290)" font-family="Inter, sans-serif" font-size="18" fill="#9ca3af" text-anchor="middle">
        <text x="40">Wed</text><text x="140">Thu</text><text x="240">Fri</text>
        <text x="340">Sat</text><text x="440">Sun</text><text x="540">Mon</text><text x="640">Tue</text>
      </g>
    </g>

    <!-- Today's Top Product -->
    <g transform="translate(60, 1420)">
      <rect x="0" y="0" width="780" height="180" rx="32" ry="32" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
      <text x="30" y="55" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#92400e">🏆 TOP SELLER TODAY</text>
      <text x="30" y="110" font-family="Inter, sans-serif" font-size="42" font-weight="900" fill="#111827">Tapal Danedar Chai</text>
      <text x="30" y="155" font-family="Inter, sans-serif" font-size="26" font-weight="600" fill="#737373">128 packs sold • Rs 12,800</text>
    </g>

    <!-- Bottom Tab Bar Indicator -->
    <rect x="270" y="1790" width="300" height="6" rx="3" ry="3" fill="#000000"/>
  </g>

  <!-- Bottom Tagline -->
  <text x="645" y="2680" font-family="Inter, sans-serif" font-size="34" font-weight="700" fill="rgba(255,255,255,0.95)" text-anchor="middle">📊 Smart insights, real-time data</text>
  <text x="645" y="2730" font-family="Inter, sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle">🇵🇰 Made for Pakistani Shopkeepers</text>
</svg>
