<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="card5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="40"/>
      <feOffset dx="0" dy="30"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg5)"/>
  <circle cx="200" cy="400" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="2300" r="250" fill="rgba(255,255,255,0.04)"/>

  <text x="645" y="220" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle">Powerful Reports</text>
  <text x="645" y="320" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#fbbf24" text-anchor="middle">Profit & Analytics 📊</text>
  <text x="645" y="400" font-family="Inter, sans-serif" font-size="36" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">Daily, weekly, monthly profit at one glance</text>

  <g transform="translate(195, 530)" filter="url(#shadow5)">
    <rect x="0" y="0" width="900" height="1900" rx="90" ry="90" fill="#1a1a1a"/>
    <rect x="15" y="15" width="870" height="1870" rx="78" ry="78" fill="#000000"/>
    <rect x="30" y="30" width="840" height="1840" rx="68" ry="68" fill="#f9fafb"/>

    <rect x="350" y="50" width="200" height="40" rx="20" ry="20" fill="#000000"/>
    <text x="80" y="125" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#000000">9:41</text>

    <text x="80" y="220" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="#111827">Reports</text>
    <text x="80" y="265" font-family="Inter, sans-serif" font-size="26" font-weight="500" fill="#737373">Business analytics & insights</text>

    <!-- Time Range Tabs -->
    <g transform="translate(60, 310)">
      <rect x="0" y="0" width="180" height="80" rx="40" ry="40" fill="#f3f4f6"/>
      <text x="90" y="52" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#737373" text-anchor="middle">7D</text>

      <rect x="200" y="0" width="180" height="80" rx="40" ry="40" fill="#8b5cf6"/>
      <text x="290" y="52" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">14D</text>

      <rect x="400" y="0" width="180" height="80" rx="40" ry="40" fill="#f3f4f6"/>
      <text x="490" y="52" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#737373" text-anchor="middle">30D</text>

      <rect x="600" y="0" width="180" height="80" rx="40" ry="40" fill="#f3f4f6"/>
      <text x="690" y="52" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#737373" text-anchor="middle">90D</text>
    </g>

    <!-- Big Profit Card -->
    <g transform="translate(60, 430)">
      <rect x="0" y="0" width="780" height="380" rx="40" ry="40" fill="url(#card5)"/>
      <text x="30" y="65" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="rgba(255,255,255,0.85)">TOTAL PROFIT (14 DAYS)</text>
      <text x="30" y="195" font-family="Inter, sans-serif" font-size="120" font-weight="900" fill="#ffffff">Rs 4,82,500</text>
      <g transform="translate(30, 220)">
        <rect x="0" y="0" width="280" height="60" rx="30" ry="30" fill="rgba(255,255,255,0.25)"/>
        <text x="140" y="40" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">↗ +32.4% vs last period</text>
      </g>

      <g transform="translate(30, 310)">
        <text x="0" y="0" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.7)">REVENUE</text>
        <text x="0" y="35" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#ffffff">Rs 12.4L</text>

        <text x="250" y="0" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.7)">ORDERS</text>
        <text x="250" y="35" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#ffffff">387</text>

        <text x="450" y="0" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.7)">MARGIN</text>
        <text x="450" y="35" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#fbbf24">38.9%</text>
      </g>
    </g>

    <!-- Sales Trend Chart -->
    <g transform="translate(60, 850)">
      <rect x="0" y="0" width="780" height="400" rx="32" ry="32" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
      <text x="30" y="55" font-family="Inter, sans-serif" font-size="28" font-weight="900" fill="#111827">📈 Sales Trend</text>
      <text x="30" y="90" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#22c55e">Trending upward</text>

      <!-- Line chart -->
      <g transform="translate(30, 130)">
        <polyline points="0,180 100,150 200,160 300,120 400,100 500,140 600,80 720,30"
                  fill="none" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="0,180 100,150 200,160 300,120 400,100 500,140 600,80 720,30 720,220 0,220"
                  fill="rgba(139, 92, 246, 0.1)"/>
        <circle cx="0" cy="180" r="10" fill="#8b5cf6"/>
        <circle cx="100" cy="150" r="10" fill="#8b5cf6"/>
        <circle cx="200" cy="160" r="10" fill="#8b5cf6"/>
        <circle cx="300" cy="120" r="10" fill="#8b5cf6"/>
        <circle cx="400" cy="100" r="10" fill="#8b5cf6"/>
        <circle cx="500" cy="140" r="10" fill="#8b5cf6"/>
        <circle cx="600" cy="80" r="10" fill="#8b5cf6"/>
        <circle cx="720" cy="30" r="14" fill="#fbbf24" stroke="#8b5cf6" stroke-width="4"/>
        <text x="720" y="15" font-family="Inter, sans-serif" font-size="20" font-weight="900" fill="#8b5cf6" text-anchor="middle">Rs 1.2L</text>
      </g>
      <g transform="translate(30, 380)" font-family="Inter, sans-serif" font-size="18" fill="#9ca3af">
        <text x="0">Day 1</text><text x="320">Day 7</text><text x="660">Day 14</text>
      </g>
    </g>

    <!-- Top Products -->
    <g transform="translate(60, 1290)">
      <text x="0" y="40" font-family="Inter, sans-serif" font-size="28" font-weight="900" fill="#111827">🏆 Top Products</text>

      <g transform="translate(0, 70)">
        <rect x="0" y="0" width="780" height="100" rx="24" ry="24" fill="#fef3c7"/>
        <circle cx="50" cy="50" r="30" fill="#fbbf24"/>
        <text x="50" y="65" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#ffffff" text-anchor="middle">1</text>
        <text x="110" y="40" font-family="Inter, sans-serif" font-size="26" font-weight="900" fill="#111827">Tapal Danedar</text>
        <text x="110" y="75" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#737373">462 sold</text>
        <text x="750" y="60" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#92400e" text-anchor="end">Rs 5.7L</text>
      </g>

      <g transform="translate(0, 190)">
        <rect x="0" y="0" width="780" height="100" rx="24" ry="24" fill="#dbeafe"/>
        <circle cx="50" cy="50" r="30" fill="#3b82f6"/>
        <text x="50" y="65" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#ffffff" text-anchor="middle">2</text>
        <text x="110" y="40" font-family="Inter, sans-serif" font-size="26" font-weight="900" fill="#111827">Olper's Milk</text>
        <text x="110" y="75" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#737373">385 sold</text>
        <text x="750" y="60" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#1e40af" text-anchor="end">Rs 84.7K</text>
      </g>

      <g transform="translate(0, 310)">
        <rect x="0" y="0" width="780" height="100" rx="24" ry="24" fill="#dcfce7"/>
        <circle cx="50" cy="50" r="30" fill="#22c55e"/>
        <text x="50" y="65" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#ffffff" text-anchor="middle">3</text>
        <text x="110" y="40" font-family="Inter, sans-serif" font-size="26" font-weight="900" fill="#111827">Peek Freans</text>
        <text x="110" y="75" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#737373">328 sold</text>
        <text x="750" y="60" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#15803d" text-anchor="end">Rs 16.4K</text>
      </g>
    </g>

    <rect x="270" y="1790" width="300" height="6" rx="3" ry="3" fill="#000000"/>
  </g>

  <text x="645" y="2680" font-family="Inter, sans-serif" font-size="34" font-weight="700" fill="rgba(255,255,255,0.95)" text-anchor="middle">📊 Har number aap ka hath mein</text>
  <text x="645" y="2730" font-family="Inter, sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle">Real-time business intelligence</text>
</svg>
