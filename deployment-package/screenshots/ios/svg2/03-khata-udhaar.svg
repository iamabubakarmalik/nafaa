  <text x="645" y="2680" font-family="Inter, sans-serif" font-size="34" font-weight="700" fill="rgba(255,255,255,0.95)" text-anchor="middle">📒 Hisaab kabhi nahi bhoolega</text>
  <text x="645" y="2730" font-family="Inter, sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle">WhatsApp se reminder send kare</text>
