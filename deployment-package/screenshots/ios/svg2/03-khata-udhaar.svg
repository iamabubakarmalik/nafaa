  <text x="645" y="400" font-family="Inter, sans-serif" font-size="36" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">Customer ka udhaar, ek tap mein WhatsApp reminder</text>

  <g transform="translate(195, 530)" filter="url(#shadow3)">
