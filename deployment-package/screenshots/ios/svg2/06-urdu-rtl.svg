      <text x="630" y="88" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#9ca3af" text-anchor="end">📞 0333-5556677</text>
      <text x="630" y="120" font-family="Inter, sans-serif" font-size="26" font-weight="900" fill="#22c55e" text-anchor="end">48,800 روپے کا خریدا</text>
