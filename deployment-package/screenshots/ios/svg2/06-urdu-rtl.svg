<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="card6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="shadow6" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="40"/>
      <feOffset dx="0" dy="30"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg6)"/>
  <circle cx="1100" cy="500" r="220" fill="rgba(255,255,255,0.05)"/>
  <circle cx="200" cy="2300" r="250" fill="rgba(255,255,255,0.04)"/>

  <text x="645" y="220" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle">100% Urdu</text>
  <text x="645" y="320" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#fbbf24" text-anchor="middle">RTL Layout 🇵🇰</text>
  <text x="645" y="400" font-family="Inter, sans-serif" font-size="36" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">Pakistan ke har shopkeeper ke liye banayi gayi</text>

  <g transform="translate(195, 530)" filter="url(#shadow6)">
