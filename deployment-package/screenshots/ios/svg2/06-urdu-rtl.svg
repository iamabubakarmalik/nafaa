        <text x="0" y="55" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#9ca3af" text-anchor="middle">کھاتہ</text>
      </g>
      <g transform="translate(380, 30)">
        <text x="0" y="20" font-family="Inter, sans-serif" font-size="28" text-anchor="middle">📦</text>
        <text x="0" y="55" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#9ca3af" text-anchor="middle">مصنوعات</text>
