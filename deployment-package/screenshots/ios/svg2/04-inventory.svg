      <rect x="405" y="0" width="375" height="450" rx="32" ry="32" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
      <rect x="425" y="20" width="335" height="230" rx="24" ry="24" fill="#fce7f3"/>
      <text x="592" y="160" font-family="Inter, sans-serif" font-size="120" text-anchor="middle">🍫</text>
      <text x="435" y="295" font-family="Inter, sans-serif" font-size="28" font-weight="900" fill="#111827">Cadbury</text>
      <text x="435" y="330" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#737373">Dairy Milk</text>
      <text x="435" y="385" font-family="Inter, sans-serif" font-size="40" font-weight="900" fill="#2563eb">Rs 180</text>
      <rect x="435" y="400" width="120" height="32" rx="16" ry="16" fill="#fee2e2"/>
      <text x="495" y="423" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#991b1b" text-anchor="middle">✕ Out</text>
