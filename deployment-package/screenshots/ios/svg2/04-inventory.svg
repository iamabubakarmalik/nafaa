      <text x="110" y="60" font-family="Inter, sans-serif" font-size="30" font-weight="900" fill="#111827">Low Stock Alert</text>
      <text x="110" y="100" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#737373">87 products need re-stocking</text>
      <rect x="110" y="115" width="240" height="42" rx="21" ry="21" fill="#92400e"/>
      <text x="230" y="143" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">View All →</text>
