      <text x="592" y="160" font-family="Inter, sans-serif" font-size="120" text-anchor="middle">🥛</text>
      <text x="435" y="295" font-family="Inter, sans-serif" font-size="28" font-weight="900" fill="#111827">Olper's Milk</text>
