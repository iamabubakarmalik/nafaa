    <rect x="15" y="15" width="870" height="1870" rx="78" ry="78" fill="#000000"/>
    <rect x="30" y="30" width="840" height="1840" rx="68" ry="68" fill="#f9fafb"/>

    <rect x="350" y="50" width="200" height="40" rx="20" ry="20" fill="#000000"/>
