    <text x="80" y="220" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="#111827">Products</text>
    <text x="80" y="265" font-family="Inter, sans-serif" font-size="26" font-weight="500" fill="#737373">1,547 total items</text>

    <g transform="translate(680, 200)">
