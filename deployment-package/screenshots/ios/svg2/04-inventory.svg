      <rect x="30" y="400" width="120" height="32" rx="16" ry="16" fill="#dcfce7"/>
      <text x="90" y="423" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#15803d" text-anchor="middle">240 in stock</text>

