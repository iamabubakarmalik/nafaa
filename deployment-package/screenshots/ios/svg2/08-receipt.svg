<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <filter id="shadow8" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="50"/>
      <feOffset dx="0" dy="40"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg8)"/>
  <circle cx="200" cy="600" r="300" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="2000" r="350" fill="rgba(255,255,255,0.04)"/>

  <text x="645" y="220" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle">Smart Receipts</text>
  <text x="645" y="320" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#fbbf24" text-anchor="middle">WhatsApp Send 📲</text>
  <text x="645" y="400" font-family="Inter, sans-serif" font-size="36" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">Print, share, save — sab kuch ek tap mein</text>

  <!-- Phone 1 (Left — Receipt View) -->
  <g transform="translate(120, 530) rotate(-5)" filter="url(#shadow8)">
    <rect x="0" y="0" width="500" height="1100" rx="60" ry="60" fill="#1a1a1a"/>
    <rect x="12" y="12" width="476" height="1076" rx="50" ry="50" fill="#000000"/>
    <rect x="22" y="22" width="456" height="1056" rx="42" ry="42" fill="#fafaf9"/>

    <rect x="200" y="35" width="100" height="25" rx="12" ry="12" fill="#000000"/>

    <text x="50" y="120" font-family="Inter, sans-serif" font-size="28" font-weight="900" fill="#111827">Receipt</text>
    <text x="50" y="155" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#9ca3af">#NF-58291</text>

    <!-- Shop Header -->
    <rect x="40" y="190" width="420" height="120" rx="20" ry="20" fill="#fef3c7"/>
    <text x="250" y="235" font-family="Inter, sans-serif" font-size="28" font-weight="900" fill="#111827" text-anchor="middle">Ahmad Kiryana</text>
    <text x="250" y="265" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#737373" text-anchor="middle">Karachi, Pakistan</text>
    <text x="250" y="290" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#9ca3af" text-anchor="middle">📞 0321-1234567</text>

    <!-- Customer -->
    <text x="50" y="350" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#737373">CUSTOMER</text>
    <text x="50" y="378" font-family="Inter, sans-serif" font-size="20" font-weight="900" fill="#111827">Bilal Hassan</text>
    <text x="50" y="402" font-family="Inter, sans-serif" font-size="14" fill="#9ca3af">12 May 2026 • 3:45 PM</text>

    <line x1="40" y1="430" x2="460" y2="430" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="6,4"/>

    <!-- Items -->
    <g transform="translate(0, 460)">
      <text x="50" y="0" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#111827">Tapal Danedar</text>
      <text x="50" y="22" font-family="Inter, sans-serif" font-size="14" fill="#9ca3af">2 × Rs 1,250</text>
      <text x="450" y="15" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#111827" text-anchor="end">Rs 2,500</text>

      <text x="50" y="60" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#111827">Olper's Milk</text>
      <text x="50" y="82" font-family="Inter, sans-serif" font-size="14" fill="#9ca3af">5 × Rs 220</text>
      <text x="450" y="75" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#111827" text-anchor="end">Rs 1,100</text>

      <text x="50" y="120" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#111827">Peek Freans</text>
      <text x="50" y="142" font-family="Inter, sans-serif" font-size="14" fill="#9ca3af">12 × Rs 50</text>
      <text x="450" y="135" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#111827" text-anchor="end">Rs 600</text>

      <text x="50" y="180" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#111827">Cadbury Choc</text>
      <text x="50" y="202" font-family="Inter, sans-serif" font-size="14" fill="#9ca3af">3 × Rs 180</text>
      <text x="450" y="195" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#111827" text-anchor="end">Rs 540</text>
    </g>

    <line x1="40" y1="700" x2="460" y2="700" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="6,4"/>

    <!-- Total -->
    <text x="50" y="740" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#737373">Subtotal</text>
    <text x="450" y="740" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#111827" text-anchor="end">Rs 4,740</text>

    <text x="50" y="775" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#737373">Discount</text>
    <text x="450" y="775" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#ea580c" text-anchor="end">- Rs 240</text>

    <rect x="40" y="810" width="420" height="80" rx="20" ry="20" fill="#16a34a"/>
    <text x="60" y="860" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#ffffff">TOTAL</text>
    <text x="440" y="865" font-family="Inter, sans-serif" font-size="34" font-weight="900" fill="#ffffff" text-anchor="end">Rs 4,500</text>

    <!-- Payment -->
    <text x="50" y="930" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#737373">Paid via</text>
    <rect x="120" y="912" width="160" height="32" rx="16" ry="16" fill="#fee2e2"/>
    <text x="200" y="934" font-family="Inter, sans-serif" font-size="16" font-weight="900" fill="#991b1b" text-anchor="middle">📱 JazzCash</text>

    <!-- Thank you -->
    <text x="250" y="990" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#111827" text-anchor="middle">شکریہ! 🙏</text>
    <text x="250" y="1015" font-family="Inter, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Powered by Nafaa</text>
  </g>

  <!-- Phone 2 (Right — Share Sheet) -->
  <g transform="translate(670, 580) rotate(5)" filter="url(#shadow8)">
    <rect x="0" y="0" width="500" height="1100" rx="60" ry="60" fill="#1a1a1a"/>
    <rect x="12" y="12" width="476" height="1076" rx="50" ry="50" fill="#000000"/>
    <rect x="22" y="22" width="456" height="1056" rx="42" ry="42" fill="#f9fafb"/>

    <rect x="200" y="35" width="100" height="25" rx="12" ry="12" fill="#000000"/>

    <!-- Modal Overlay -->
    <rect x="22" y="22" width="456" height="1056" rx="42" ry="42" fill="rgba(0,0,0,0.5)"/>

    <!-- Bottom Sheet -->
    <rect x="22" y="500" width="456" height="578" rx="42" ry="42" fill="#ffffff"/>

    <!-- Handle -->
    <rect x="220" y="520" width="60" height="6" rx="3" ry="3" fill="#d1d5db"/>

    <!-- Header -->
    <text x="250" y="580" font-family="Inter, sans-serif" font-size="26" font-weight="900" fill="#111827" text-anchor="middle">Share Receipt</text>
    <text x="250" y="610" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#9ca3af" text-anchor="middle">Choose how to send to customer</text>

    <!-- WhatsApp Option (highlighted) -->
    <g transform="translate(40, 650)">
      <rect x="0" y="0" width="420" height="120" rx="28" ry="28" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
      <circle cx="60" cy="60" r="36" fill="#25D366"/>
      <text x="60" y="75" font-family="Inter, sans-serif" font-size="40" text-anchor="middle">💬</text>
      <text x="115" y="55" font-family="Inter, sans-serif" font-size="24" font-weight="900" fill="#111827">WhatsApp</text>
      <text x="115" y="85" font-family="Inter, sans-serif" font-size="16" font-weight="500" fill="#737373">Send to Bilal • 0321-4772935</text>
      <text x="380" y="65" font-family="Inter, sans-serif" font-size="36" fill="#16a34a" text-anchor="middle">→</text>
    </g>

    <!-- SMS Option -->
    <g transform="translate(40, 790)">
      <rect x="0" y="0" width="420" height="100" rx="28" ry="28" fill="#dbeafe"/>
      <circle cx="60" cy="50" r="30" fill="#3b82f6"/>
      <text x="60" y="62" font-family="Inter, sans-serif" font-size="32" text-anchor="middle">💬</text>
      <text x="110" y="45" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#111827">SMS</text>
      <text x="110" y="75" font-family="Inter, sans-serif" font-size="15" font-weight="500" fill="#737373">Text message</text>
    </g>

    <!-- Print Option -->
    <g transform="translate(40, 910)">
      <rect x="0" y="0" width="200" height="120" rx="28" ry="28" fill="#fef3c7"/>
      <circle cx="100" cy="50" r="32" fill="#fbbf24"/>
      <text x="100" y="62" font-family="Inter, sans-serif" font-size="32" text-anchor="middle">🖨️</text>
      <text x="100" y="105" font-family="Inter, sans-serif" font-size="20" font-weight="900" fill="#111827" text-anchor="middle">Print</text>
    </g>

    <!-- PDF Option -->
    <g transform="translate(260, 910)">
      <rect x="0" y="0" width="200" height="120" rx="28" ry="28" fill="#fce7f3"/>
      <circle cx="100" cy="50" r="32" fill="#ec4899"/>
      <text x="100" y="62" font-family="Inter, sans-serif" font-size="32" text-anchor="middle">📄</text>
      <text x="100" y="105" font-family="Inter, sans-serif" font-size="20" font-weight="900" fill="#111827" text-anchor="middle">PDF Save</text>
    </g>
  </g>

  <!-- Features below -->
  <g transform="translate(120, 1900)">
    <rect x="0" y="0" width="1050" height="200" rx="40" ry="40" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

    <g transform="translate(40, 40)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="50" text-anchor="start">💬</text>
      <text x="70" y="-5" font-family="Inter, sans-serif" font-size="26" font-weight="900" fill="#ffffff">WhatsApp Receipt</text>
      <text x="70" y="25" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.7)">Customer ko ek tap mein send</text>
    </g>

    <g transform="translate(540, 40)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="50" text-anchor="start">🖨️</text>
      <text x="70" y="-5" font-family="Inter, sans-serif" font-size="26" font-weight="900" fill="#ffffff">Bluetooth Printer</text>
      <text x="70" y="25" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.7)">Thermal printer support</text>
    </g>

    <g transform="translate(40, 130)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="50" text-anchor="start">📄</text>
      <text x="70" y="-5" font-family="Inter, sans-serif" font-size="26" font-weight="900" fill="#ffffff">PDF Export</text>
      <text x="70" y="25" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.7)">Save & share digitally</text>
    </g>

    <g transform="translate(540, 130)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="50" text-anchor="start">🇵🇰</text>
      <text x="70" y="-5" font-family="Inter, sans-serif" font-size="26" font-weight="900" fill="#ffffff">Urdu + English</text>
      <text x="70" y="25" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.7)">Bilingual receipts</text>
    </g>
  </g>

  <text x="645" y="2680" font-family="Inter, sans-serif" font-size="34" font-weight="700" fill="rgba(255,255,255,0.95)" text-anchor="middle">📲 Receipt sharing made simple</text>
  <text x="645" y="2730" font-family="Inter, sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle">Print, WhatsApp, PDF — sab options</text>
</svg>
