<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#164e63"/>
    </linearGradient>
    <filter id="shadow9" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="50"/>
      <feOffset dx="0" dy="40"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg9)"/>
  <circle cx="1100" cy="400" r="250" fill="rgba(255,255,255,0.06)"/>
  <circle cx="200" cy="2200" r="300" fill="rgba(255,255,255,0.04)"/>

  <text x="645" y="220" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle">All Payment</text>
  <text x="645" y="320" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#fbbf24" text-anchor="middle">Methods 💳</text>
  <text x="645" y="400" font-family="Inter, sans-serif" font-size="36" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">Cash, Card, JazzCash, EasyPaisa, Khata — sab</text>

  <!-- Payment Method Cards (grid layout) -->
  <g transform="translate(120, 530)">

    <!-- Cash -->
    <g transform="translate(0, 0)" filter="url(#shadow9)">
      <rect x="0" y="0" width="490" height="280" rx="40" ry="40" fill="#ffffff"/>
      <rect x="0" y="0" width="490" height="280" rx="40" ry="40" fill="url(#card1)" opacity="0.95"/>
      <text x="40" y="80" font-family="Inter, sans-serif" font-size="64" text-anchor="start">💵</text>
      <text x="40" y="160" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#ffffff">Cash</text>
      <text x="40" y="200" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Cash drawer integration</text>
      <text x="40" y="230" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Open/close tracking</text>
      <text x="40" y="260" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">End-of-day reconciliation</text>
    </g>

    <!-- Card -->
    <g transform="translate(560, 0)" filter="url(#shadow9)">
      <rect x="0" y="0" width="490" height="280" rx="40" ry="40" fill="#1e3a8a"/>
      <text x="40" y="80" font-family="Inter, sans-serif" font-size="64" text-anchor="start">💳</text>
      <text x="40" y="160" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#ffffff">Card</text>
      <text x="40" y="200" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Debit/Credit cards</text>
      <text x="40" y="230" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Visa, MasterCard, UnionPay</text>
      <text x="40" y="260" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Receipt printer linked</text>
    </g>

    <!-- JazzCash -->
    <g transform="translate(0, 320)" filter="url(#shadow9)">
      <rect x="0" y="0" width="490" height="280" rx="40" ry="40" fill="#dc2626"/>
      <text x="40" y="80" font-family="Inter, sans-serif" font-size="64" text-anchor="start">📱</text>
      <text x="40" y="160" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#ffffff">JazzCash</text>
      <text x="40" y="200" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Mobile wallet support</text>
      <text x="40" y="230" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">QR code generation</text>
      <text x="40" y="260" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Instant confirmation</text>
    </g>

    <!-- EasyPaisa -->
    <g transform="translate(560, 320)" filter="url(#shadow9)">
      <rect x="0" y="0" width="490" height="280" rx="40" ry="40" fill="#059669"/>
      <text x="40" y="80" font-family="Inter, sans-serif" font-size="64" text-anchor="start">📱</text>
      <text x="40" y="160" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#ffffff">EasyPaisa</text>
      <text x="40" y="200" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Pakistan ka favorite</text>
      <text x="40" y="230" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Real-time tracking</text>
      <text x="40" y="260" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Auto reconciliation</text>
    </g>

    <!-- Khata -->
    <g transform="translate(0, 640)" filter="url(#shadow9)">
      <rect x="0" y="0" width="490" height="280" rx="40" ry="40" fill="#ea580c"/>
      <text x="40" y="80" font-family="Inter, sans-serif" font-size="64" text-anchor="start">📒</text>
      <text x="40" y="160" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#ffffff">Khata / Udhaar</text>
      <text x="40" y="200" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Customer credit tracking</text>
      <text x="40" y="230" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">WhatsApp reminders</text>
      <text x="40" y="260" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Credit limit alerts</text>
    </g>

    <!-- Bank Transfer -->
    <g transform="translate(560, 640)" filter="url(#shadow9)">
      <rect x="0" y="0" width="490" height="280" rx="40" ry="40" fill="#7c3aed"/>
      <text x="40" y="80" font-family="Inter, sans-serif" font-size="64" text-anchor="start">🏦</text>
      <text x="40" y="160" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#ffffff">Bank Transfer</text>
      <text x="40" y="200" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">HBL, Meezan, UBL, MCB</text>
      <text x="40" y="230" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">IBAN supported</text>
      <text x="40" y="260" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="rgba(255,255,255,0.85)">Verification proof upload</text>
    </g>

  </g>

  <!-- Stats Banner -->
  <g transform="translate(120, 1700)">
    <rect x="0" y="0" width="1050" height="240" rx="40" ry="40" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

    <g transform="translate(60, 60)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="60" font-weight="900" fill="#fbbf24">6+</text>
      <text x="0" y="40" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#ffffff">Payment</text>
      <text x="0" y="70" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#ffffff">Methods</text>
    </g>

    <g transform="translate(300, 60)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="60" font-weight="900" fill="#fbbf24">100%</text>
      <text x="0" y="40" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#ffffff">Pakistan-</text>
      <text x="0" y="70" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#ffffff">first</text>
    </g>

    <g transform="translate(580, 60)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="60" font-weight="900" fill="#fbbf24">⚡</text>
      <text x="0" y="40" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#ffffff">Instant</text>
      <text x="0" y="70" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#ffffff">payments</text>
    </g>

    <g transform="translate(810, 60)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="60" font-weight="900" fill="#fbbf24">🔒</text>
      <text x="0" y="40" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#ffffff">Secure</text>
      <text x="0" y="70" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#ffffff">end-to-end</text>
    </g>
  </g>

  <!-- Floating Logos -->
  <g transform="translate(120, 2050)">
    <rect x="0" y="0" width="1050" height="180" rx="32" ry="32" fill="#ffffff"/>
    <text x="525" y="40" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#9ca3af" text-anchor="middle">SUPPORTED BANKS &amp; WALLETS</text>

    <g transform="translate(50, 80)">
      <rect x="0" y="0" width="160" height="70" rx="16" ry="16" fill="#dcfce7"/>
      <text x="80" y="45" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#15803d" text-anchor="middle">HBL</text>
    </g>

    <g transform="translate(230, 80)">
      <rect x="0" y="0" width="160" height="70" rx="16" ry="16" fill="#dbeafe"/>
      <text x="80" y="45" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#1e40af" text-anchor="middle">Meezan</text>
    </g>

    <g transform="translate(410, 80)">
      <rect x="0" y="0" width="160" height="70" rx="16" ry="16" fill="#fee2e2"/>
      <text x="80" y="45" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#991b1b" text-anchor="middle">UBL</text>
    </g>

    <g transform="translate(590, 80)">
      <rect x="0" y="0" width="160" height="70" rx="16" ry="16" fill="#fef3c7"/>
      <text x="80" y="45" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#92400e" text-anchor="middle">MCB</text>
    </g>

    <g transform="translate(770, 80)">
      <rect x="0" y="0" width="160" height="70" rx="16" ry="16" fill="#fce7f3"/>
      <text x="80" y="45" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#9f1239" text-anchor="middle">Allied</text>
    </g>
  </g>

  <text x="645" y="2680" font-family="Inter, sans-serif" font-size="34" font-weight="700" fill="rgba(255,255,255,0.95)" text-anchor="middle">💳 Pakistan ke har payment method</text>
  <text x="645" y="2730" font-family="Inter, sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.7)" text-anchor="middle">Customer comfortable, you in control</text>
</svg>
