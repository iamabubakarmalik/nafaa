<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="50%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="ctaBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow10" cx="50%" cy="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="bigShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="30"/>
      <feOffset dx="0" dy="20"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg10)"/>
  
  <!-- Big glow -->
  <ellipse cx="645" cy="1400" rx="700" ry="700" fill="url(#glow10)"/>
  
  <!-- Decorative -->
  <g fill="rgba(255,255,255,0.06)">
    <circle cx="100" cy="300" r="60"/>
    <circle cx="1200" cy="500" r="80"/>
    <circle cx="200" cy="2400" r="100"/>
    <circle cx="1100" cy="2200" r="70"/>
  </g>
  
  <!-- Stars -->
  <g fill="#fbbf24">
