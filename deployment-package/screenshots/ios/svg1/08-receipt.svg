          <text x="123" y="105" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#1e40af" text-anchor="middle">Print</text>
          <text x="123" y="128" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#2563eb" text-anchor="middle">Bluetooth</text>
        </g>
        
