      <text x="620" y="750" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#111827" text-anchor="end">Rs 1,500</text>
      <text x="40" y="775" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="#9ca3af">Rs 250 each</text>

      <text x="40" y="830" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#111827">Peek Freans Biscuits</text>
