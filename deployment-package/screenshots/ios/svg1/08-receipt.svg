      <text x="620" y="910" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#111827" text-anchor="end">Rs 600</text>
      <text x="40" y="935" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="#9ca3af">Rs 120 each</text>

