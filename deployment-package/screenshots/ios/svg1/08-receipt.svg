      <text x="40" y="1080" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#6b7280">GST (17%)</text>
      <text x="620" y="1080" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="end">Rs 949</text>

