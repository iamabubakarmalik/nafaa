      <text x="40" y="670" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#111827">National Pickle 1kg</text>
      <text x="400" y="670" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#111827" text-anchor="middle">3</text>
      <text x="620" y="670" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#111827" text-anchor="end">Rs 1,260</text>
