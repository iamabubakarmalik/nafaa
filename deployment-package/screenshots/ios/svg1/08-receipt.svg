          <text x="123" y="60" font-family="Inter, sans-serif" font-size="48" text-anchor="middle">📄</text>
          <text x="123" y="105" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#92400e" text-anchor="middle">PDF</text>
          <text x="123" y="128" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#d97706" text-anchor="middle">Email</text>
