<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="50%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="salesCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="20"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1290" height="2796" fill="url(#bg1)"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="400" r="180" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="600" r="120" fill="rgba(255,255,255,0.04)"/>
  <circle cx="150" cy="2400" r="200" fill="rgba(255,255,255,0.05)"/>

  <!-- Top Headline -->
  <text x="645" y="220" font-family="Inter, -apple-system, sans-serif" font-size="92" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    Aaj Rs 60,000+
  </text>
  <text x="645" y="320" font-family="Inter, sans-serif" font-size="72" font-weight="800" fill="#fbbf24" text-anchor="middle">
    Kamao Aasani Se! 💰
  </text>
  
  <!-- Subheadline -->
  <text x="645" y="410" font-family="Inter, sans-serif" font-size="42" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">
    Pakistan ka #1 Smart POS
  </text>

  <!-- iPhone mockup -->
  <g transform="translate(195, 480)" filter="url(#shadow1)">
    <!-- Phone body -->
    <rect x="0" y="0" width="900" height="1850" rx="80" ry="80" fill="url(#phoneGrad)"/>
    <rect x="20" y="20" width="860" height="1810" rx="64" ry="64" fill="url(#screenGrad)"/>
    
    <!-- Status bar -->
    <text x="80" y="80" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#111827">9:41</text>
    <g transform="translate(740, 60)">
      <!-- Signal -->
      <rect x="0" y="10" width="6" height="14" rx="2" fill="#111827"/>
      <rect x="10" y="6" width="6" height="18" rx="2" fill="#111827"/>
      <rect x="20" y="2" width="6" height="22" rx="2" fill="#111827"/>
      <!-- Battery -->
      <rect x="50" y="6" width="50" height="22" rx="6" fill="none" stroke="#111827" stroke-width="2"/>
      <rect x="54" y="10" width="38" height="14" rx="3" fill="#16a34a"/>
    </g>

    <!-- Greeting -->
    <text x="60" y="180" font-family="Inter, sans-serif" font-size="32" font-weight="500" fill="#6b7280">
      Good Morning 👋
    </text>
    <text x="60" y="240" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="#111827">
      Malik Ahmad
    </text>
    <text x="60" y="290" font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="#16a34a">
      👑 Malik Kiryana Store
    </text>

    <!-- Main Sales Card -->
    <g transform="translate(60, 340)">
      <rect width="780" height="380" rx="40" ry="40" fill="url(#salesCard)"/>
      
      <!-- Sparkle icon -->
      <g transform="translate(40, 50)">
        <text font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="3">
          ✨ AAJ KI SALES
        </text>
      </g>
      
      <!-- Big amount -->
      <text x="40" y="180" font-family="Inter, sans-serif" font-size="120" font-weight="900" fill="#ffffff">
        Rs 64.5K
      </text>
      
      <!-- Trend badge -->
      <g transform="translate(40, 220)">
        <rect width="280" height="55" rx="28" ry="28" fill="rgba(255,255,255,0.25)"/>
        <text x="140" y="38" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">
          📈 +245% vs kal
        </text>
      </g>
      
      <!-- Stats -->
      <g transform="translate(40, 310)">
        <text font-family="Inter, sans-serif" font-size="28" font-weight="600" fill="rgba(255,255,255,0.95)">
          🛒 47 orders   👥 32 customers
        </text>
      </g>
      
      <!-- Wallet icon -->
      <g transform="translate(600, 60)">
        <rect width="140" height="140" rx="32" ry="32" fill="rgba(255,255,255,0.2)"/>
        <text x="70" y="100" font-family="Inter, sans-serif" font-size="80" text-anchor="middle">💼</text>
      </g>
    </g>

    <!-- Quick stats row -->
    <g transform="translate(60, 760)">
      <!-- Profit card -->
      <rect width="380" height="200" rx="32" ry="32" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="2"/>
      <text x="40" y="60" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#16a34a">
        💰 NET PROFIT
      </text>
      <text x="40" y="130" font-family="Inter, sans-serif" font-size="64" font-weight="900" fill="#15803d">
        Rs 18.2K
      </text>
      <text x="40" y="170" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#16a34a">
        Margin: 28.2% ⬆
      </text>
      
      <!-- Orders card -->
      <g transform="translate(400, 0)">
        <rect width="380" height="200" rx="32" ry="32" fill="#fef3c7" stroke="#fde68a" stroke-width="2"/>
        <text x="40" y="60" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#d97706">
          🛒 ORDERS
        </text>
        <text x="40" y="130" font-family="Inter, sans-serif" font-size="64" font-weight="900" fill="#92400e">
          47
        </text>
        <text x="40" y="170" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#d97706">
          Avg Rs 1,372
        </text>
      </g>
    </g>

    <!-- 7-day trend mini chart -->
    <g transform="translate(60, 1000)">
      <text x="0" y="40" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#111827">
        📊 7-Day Trend
      </text>
      
      <!-- Chart background -->
      <rect x="0" y="70" width="780" height="240" rx="32" ry="32" fill="#fafafa"/>
      
      <!-- Bars -->
      <g transform="translate(40, 100)">
        <rect x="0" y="120" width="80" height="80" rx="8" ry="8" fill="#86efac"/>
        <rect x="100" y="80" width="80" height="120" rx="8" ry="8" fill="#4ade80"/>
        <rect x="200" y="60" width="80" height="140" rx="8" ry="8" fill="#22c55e"/>
        <rect x="300" y="40" width="80" height="160" rx="8" ry="8" fill="#16a34a"/>
        <rect x="400" y="90" width="80" height="110" rx="8" ry="8" fill="#4ade80"/>
        <rect x="500" y="20" width="80" height="180" rx="8" ry="8" fill="#15803d"/>
        <rect x="600" y="0" width="80" height="200" rx="8" ry="8" fill="#14532d"/>
        
        <!-- Day labels -->
        <text x="40" y="225" font-family="Inter, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">Wed</text>
        <text x="140" y="225" font-family="Inter, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">Thu</text>
        <text x="240" y="225" font-family="Inter, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">Fri</text>
        <text x="340" y="225" font-family="Inter, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">Sat</text>
        <text x="440" y="225" font-family="Inter, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">Sun</text>
        <text x="540" y="225" font-family="Inter, sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">Mon</text>
        <text x="640" y="225" font-family="Inter, sans-serif" font-size="18" fill="#16a34a" text-anchor="middle" font-weight="700">TODAY</text>
      </g>
    </g>

    <!-- Quick action buttons -->
    <g transform="translate(60, 1360)">
      <!-- New Sale -->
      <rect width="180" height="180" rx="32" ry="32" fill="#16a34a"/>
      <text x="90" y="80" font-family="Inter, sans-serif" font-size="48" text-anchor="middle">🛍️</text>
      <text x="90" y="130" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">New Sale</text>
      
      <!-- Add Product -->
      <g transform="translate(200, 0)">
        <rect width="180" height="180" rx="32" ry="32" fill="#3b82f6"/>
        <text x="90" y="80" font-family="Inter, sans-serif" font-size="48" text-anchor="middle">📦</text>
        <text x="90" y="130" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">Product</text>
      </g>
      
      <!-- Khata -->
      <g transform="translate(400, 0)">
        <rect width="180" height="180" rx="32" ry="32" fill="#f59e0b"/>
        <text x="90" y="80" font-family="Inter, sans-serif" font-size="48" text-anchor="middle">📒</text>
        <text x="90" y="130" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">Khata</text>
      </g>
      
      <!-- Reports -->
      <g transform="translate(600, 0)">
        <rect width="180" height="180" rx="32" ry="32" fill="#8b5cf6"/>
        <text x="90" y="80" font-family="Inter, sans-serif" font-size="48" text-anchor="middle">📊</text>
        <text x="90" y="130" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">Reports</text>
      </g>
    </g>

    <!-- Bottom nav -->
    <g transform="translate(60, 1680)">
      <rect width="780" height="120" rx="36" ry="36" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
      <text x="100" y="60" font-family="Inter, sans-serif" font-size="36" text-anchor="middle">🏠</text>
      <text x="100" y="95" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#16a34a" text-anchor="middle">Home</text>
      
      <text x="260" y="60" font-family="Inter, sans-serif" font-size="36" text-anchor="middle">🛒</text>
      <text x="260" y="95" font-family="Inter, sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">POS</text>
      
      <text x="420" y="60" font-family="Inter, sans-serif" font-size="36" text-anchor="middle">📦</text>
      <text x="420" y="95" font-family="Inter, sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">Products</text>
      
      <text x="580" y="60" font-family="Inter, sans-serif" font-size="36" text-anchor="middle">👥</text>
      <text x="580" y="95" font-family="Inter, sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">Khata</text>
      
      <text x="700" y="60" font-family="Inter, sans-serif" font-size="36" text-anchor="middle">⚙️</text>
      <text x="700" y="95" font-family="Inter, sans-serif" font-size="20" fill="#9ca3af" text-anchor="middle">More</text>
    </g>
  </g>

  <!-- Bottom CTA -->
  <text x="645" y="2540" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#ffffff" text-anchor="middle">
    Apni Dukan Smart Banao
  </text>
  <text x="645" y="2620" font-family="Inter, sans-serif" font-size="38" font-weight="600" fill="#fbbf24" text-anchor="middle">
    ⭐⭐⭐⭐⭐ 50,000+ Shops Trust Nafaa
  </text>
  
  <!-- Made in Pakistan badge -->
  <g transform="translate(495, 2700)">
    <rect width="300" height="60" rx="30" ry="30" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="150" y="40" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">
      🇵🇰 MADE IN PAKISTAN
    </text>
  </g>
</svg>
