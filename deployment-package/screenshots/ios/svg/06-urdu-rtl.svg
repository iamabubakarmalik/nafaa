      </text>
      <text x="100" y="85" font-family="'Noto Nastaliq Urdu', serif" font-size="22" font-weight="600" fill="#16a34a">
        ✅ نقد
      </text>
    </g>

    <g transform="translate(60, 1190)">
      <rect width="780" height="120" rx="28" ry="28" fill="#fef3c7" stroke="#fde68a" stroke-width="2"/>
      <text x="740" y="50" font-family="'Noto Nastaliq Urdu', serif" font-size="28" font-weight="800" fill="#111827" text-anchor="end">
        احمد خان
      </text>
      <text x="740" y="85" font-family="'Noto Nastaliq Urdu', serif" font-size="22" font-weight="500" fill="#6b7280" text-anchor="end">
        نمک، چینی، تیل
      </text>
      <text x="100" y="50" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#d97706">
        ‎2,300‎ ₨
      </text>
      <text x="100" y="85" font-family="'Noto Nastaliq Urdu', serif" font-size="22" font-weight="600" fill="#d97706">
        📒 ادھار
      </text>
    </g>

    <g transform="translate(60, 1330)">
      <rect width="780" height="120" rx="28" ry="28" fill="#fafafa" stroke="#e5e7eb" stroke-width="2"/>
      <text x="740" y="50" font-family="'Noto Nastaliq Urdu', serif" font-size="28" font-weight="800" fill="#111827" text-anchor="end">
        ملک طارق
      </text>
      <text x="740" y="85" font-family="'Noto Nastaliq Urdu', serif" font-size="22" font-weight="500" fill="#6b7280" text-anchor="end">
        بسکٹ، کولڈ ڈرنک
      </text>
      <text x="100" y="50" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#16a34a">
        ‎850‎ ₨
      </text>
      <text x="100" y="85" font-family="'Noto Nastaliq Urdu', serif" font-size="22" font-weight="600" fill="#3b82f6">
        💳 جاز کیش
      </text>
    </g>

    <!-- Language showcase card -->
    <g transform="translate(60, 1500)">
      <rect width="780" height="200" rx="40" ry="40" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
      <text x="60" y="70" font-family="'Noto Nastaliq Urdu', serif" font-size="38" font-weight="900" fill="#15803d">
        ⭐ مکمل اردو سپورٹ
      </text>
      <text x="60" y="115" font-family="'Noto Nastaliq Urdu', serif" font-size="26" font-weight="500" fill="#16a34a">
        دائیں سے بائیں خوبصورت لے آؤٹ
      </text>
      <text x="60" y="160" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#15803d">
        ✓ Urdu Script  ✓ RTL  ✓ Numbers
      </text>
    </g>

    <!-- Bottom nav RTL -->
    <g transform="translate(60, 1730)">
      <rect width="780" height="110" rx="36" ry="36" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
      <!-- Items reversed for RTL -->
      <text x="100" y="50" font-family="Inter, sans-serif" font-size="32" text-anchor="middle">⚙️</text>
      <text x="100" y="85" font-family="'Noto Nastaliq Urdu', serif" font-size="20" fill="#9ca3af" text-anchor="middle">مزید</text>
      
      <text x="260" y="50" font-family="Inter, sans-serif" font-size="32" text-anchor="middle">👥</text>
      <text x="260" y="85" font-family="'Noto Nastaliq Urdu', serif" font-size="20" fill="#9ca3af" text-anchor="middle">کھاتہ</text>
      
      <text x="420" y="50" font-family="Inter, sans-serif" font-size="32" text-anchor="middle">📦</text>
      <text x="420" y="85" font-family="'Noto Nastaliq Urdu', serif" font-size="20" fill="#9ca3af" text-anchor="middle">پراڈکٹس</text>
      
      <text x="580" y="50" font-family="Inter, sans-serif" font-size="32" text-anchor="middle">🛒</text>
      <text x="580" y="85" font-family="'Noto Nastaliq Urdu', serif" font-size="20" fill="#9ca3af" text-anchor="middle">پی او ایس</text>
      
      <text x="700" y="50" font-family="Inter, sans-serif" font-size="32" text-anchor="middle">🏠</text>
      <text x="700" y="85" font-family="'Noto Nastaliq Urdu', serif" font-size="20" fill="#16a34a" text-anchor="middle" font-weight="700">گھر</text>
    </g>
  </g>

  <text x="645" y="2540" font-family="'Noto Nastaliq Urdu', serif" font-size="56" font-weight="900" fill="#ffffff" text-anchor="middle">
    اپنی زبان، اپنا کاروبار
  </text>
  <text x="645" y="2620" font-family="Inter, sans-serif" font-size="36" font-weight="600" fill="#fbbf24" text-anchor="middle">
    First POS with Native Urdu in Pakistan
  </text>
  
  <g transform="translate(495, 2700)">
    <rect width="300" height="60" rx="30" ry="30" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="150" y="40" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">
      🇵🇰 PROUDLY PAKISTANI
    </text>
  </g>
</svg>
