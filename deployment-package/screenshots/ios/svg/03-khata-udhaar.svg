<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="khataCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="phoneG3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="20"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1290" height="2796" fill="url(#bg3)"/>
  <circle cx="1100" cy="500" r="180" fill="rgba(255,255,255,0.06)"/>
  <circle cx="150" cy="2200" r="200" fill="rgba(255,255,255,0.05)"/>

  <text x="645" y="220" font-family="Inter, sans-serif" font-size="92" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    Khata Khatam Bhool!
  </text>
  <text x="645" y="320" font-family="Inter, sans-serif" font-size="64" font-weight="800" fill="#fbbf24" text-anchor="middle">
    📒 Sab Yaad Rahega
  </text>
  <text x="645" y="400" font-family="Inter, sans-serif" font-size="38" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">
    Customer Udhaar • Auto Reminders • Reports
  </text>

  <g transform="translate(195, 470)" filter="url(#shadow3)">
    <rect x="0" y="0" width="900" height="1900" rx="80" ry="80" fill="url(#phoneG3)"/>
    <rect x="20" y="20" width="860" height="1860" rx="64" ry="64" fill="#fef2f2"/>
    
    <text x="80" y="80" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#111827">9:41</text>
    <g transform="translate(780, 65)">
      <rect x="0" y="6" width="50" height="22" rx="6" fill="none" stroke="#111827" stroke-width="2"/>
      <rect x="54" y="10" width="38" height="14" rx="3" fill="#16a34a"/>
    </g>

    <text x="60" y="200" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="#111827">
      📒 Khata Book
    </text>
    <text x="60" y="250" font-family="Inter, sans-serif" font-size="26" font-weight="500" fill="#6b7280">
      Customers ka udhaar
    </text>

    <!-- Main outstanding card -->
    <g transform="translate(60, 290)">
      <rect width="780" height="320" rx="40" ry="40" fill="url(#khataCard)"/>
      
      <text x="40" y="80" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="3">
        📚 TOTAL OUTSTANDING
      </text>
      <text x="40" y="200" font-family="Inter, sans-serif" font-size="130" font-weight="900" fill="#ffffff">
        Rs 2.5L
      </text>
      <text x="40" y="250" font-family="Inter, sans-serif" font-size="32" font-weight="600" fill="#fbbf24">
        ↑ Rs 18,500 this week
      </text>
      
      <!-- Stats sub-grid -->
      <g transform="translate(40, 270)">
        <rect width="200" height="35" rx="18" ry="18" fill="rgba(255,255,255,0.2)"/>
        <text x="100" y="25" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">
          24 Customers
        </text>
      </g>
    </g>

    <!-- Quick stats row -->
    <g transform="translate(60, 650)">
      <rect width="245" height="160" rx="24" ry="24" fill="#ffffff" stroke="#fecaca" stroke-width="2"/>
      <text x="30" y="55" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#dc2626">
        🔴 OVERDUE
      </text>
      <text x="30" y="105" font-family="Inter, sans-serif" font-size="42" font-weight="900" fill="#111827">
