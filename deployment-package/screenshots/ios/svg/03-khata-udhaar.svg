      </text>
      <text x="160" y="125" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#dc2626">
        💰 Owes: Rs 45,000
      </text>
      <rect x="620" y="40" width="140" height="60" rx="30" ry="30" fill="#16a34a"/>
      <text x="690" y="80" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">
        💵 Receive
      </text>
    </g>

    <!-- Debtor 2 -->
    <g transform="translate(60, 1060)">
      <rect width="780" height="140" rx="28" ry="28" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
      <circle cx="80" cy="70" r="50" fill="#fef3c7"/>
      <text x="80" y="85" font-family="Inter, sans-serif" font-size="40" font-weight="900" fill="#d97706" text-anchor="middle">B</text>
      <text x="160" y="55" font-family="Inter, sans-serif" font-size="30" font-weight="800" fill="#111827">
        Bilal Hassan
      </text>
      <text x="160" y="95" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#6b7280">
        📞 0333-1234567 • Due in 7 days
      </text>
      <text x="160" y="125" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#d97706">
        💰 Owes: Rs 32,500
      </text>
      <rect x="620" y="40" width="140" height="60" rx="30" ry="30" fill="#3b82f6"/>
      <text x="690" y="80" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">
        📱 Remind
      </text>
    </g>

    <!-- Debtor 3 -->
    <g transform="translate(60, 1220)">
      <rect width="780" height="140" rx="28" ry="28" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
      <circle cx="80" cy="70" r="50" fill="#dbeafe"/>
      <text x="80" y="85" font-family="Inter, sans-serif" font-size="40" font-weight="900" fill="#1e40af" text-anchor="middle">M</text>
      <text x="160" y="55" font-family="Inter, sans-serif" font-size="30" font-weight="800" fill="#111827">
        Malik Tariq
      </text>
      <text x="160" y="95" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#6b7280">
        📞 0300-9876543 • Regular customer
      </text>
      <text x="160" y="125" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#16a34a">
        💰 Owes: Rs 28,000
      </text>
      <rect x="620" y="40" width="140" height="60" rx="30" ry="30" fill="#16a34a"/>
      <text x="690" y="80" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">
        💵 Receive
      </text>
    </g>

    <!-- WhatsApp reminder card -->
    <g transform="translate(60, 1400)">
      <rect width="780" height="180" rx="32" ry="32" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
      <text x="60" y="60" font-family="Inter, sans-serif" font-size="40" font-weight="900" fill="#15803d">
        💬 Auto WhatsApp Reminders
      </text>
      <text x="60" y="105" font-family="Inter, sans-serif" font-size="24" font-weight="500" fill="#16a34a">
        Customers ko automatic reminders bhejein
      </text>
      <text x="60" y="145" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#15803d">
        ✓ Polite • ✓ Daily • ✓ Customizable
      </text>
    </g>

    <!-- Quick action -->
    <g transform="translate(60, 1620)">
      <rect width="780" height="160" rx="40" ry="40" fill="#16a34a"/>
      <text x="390" y="70" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#ffffff" text-anchor="middle">
        📒 Naya Khata Banayein
      </text>
      <text x="390" y="120" font-family="Inter, sans-serif" font-size="24" font-weight="500" fill="rgba(255,255,255,0.9)" text-anchor="middle">
        Add new customer with credit limit
      </text>
    </g>
  </g>

  <text x="645" y="2540" font-family="Inter, sans-serif" font-size="54" font-weight="900" fill="#ffffff" text-anchor="middle">
    Har Paisa Yaad, Har Customer Track
  </text>
  <text x="645" y="2620" font-family="Inter, sans-serif" font-size="36" font-weight="600" fill="#fbbf24" text-anchor="middle">
    Pakistani Shopkeepers Ki No.1 Choice
  </text>
  
  <g transform="translate(495, 2700)">
    <rect width="300" height="60" rx="30" ry="30" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="150" y="40" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">
      🇵🇰 BUILT FOR PAKISTAN
    </text>
  </g>
</svg>
