      </text>
      <text x="30" y="140" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#6b7280">
        8 customers
      </text>
      
      <g transform="translate(267, 0)">
        <rect width="245" height="160" rx="24" ry="24" fill="#ffffff" stroke="#fde68a" stroke-width="2"/>
        <text x="30" y="55" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#d97706">
          ⏳ DUE SOON
        </text>
        <text x="30" y="105" font-family="Inter, sans-serif" font-size="42" font-weight="900" fill="#111827">
          Rs 1.1L
        </text>
        <text x="30" y="140" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#6b7280">
          12 customers
        </text>
      </g>
      
      <g transform="translate(534, 0)">
        <rect width="245" height="160" rx="24" ry="24" fill="#ffffff" stroke="#bbf7d0" stroke-width="2"/>
        <text x="30" y="55" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#16a34a">
          ✅ RECEIVED
        </text>
        <text x="30" y="105" font-family="Inter, sans-serif" font-size="42" font-weight="900" fill="#111827">
          Rs 45K
        </text>
        <text x="30" y="140" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#6b7280">
          This week
        </text>
      </g>
    </g>

    <!-- Top debtors heading -->
    <text x="60" y="870" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#111827">
      ⚠️ Top Debtors
    </text>

    <!-- Debtor 1 -->
    <g transform="translate(60, 900)">
      <rect width="780" height="140" rx="28" ry="28" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
      <circle cx="80" cy="70" r="50" fill="#fee2e2"/>
      <text x="80" y="85" font-family="Inter, sans-serif" font-size="40" font-weight="900" fill="#dc2626" text-anchor="middle">A</text>
      <text x="160" y="55" font-family="Inter, sans-serif" font-size="30" font-weight="800" fill="#111827">
        Ahmad Khan
      </text>
      <text x="160" y="95" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#6b7280">
