<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 2796" width="1290" height="2796">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="50%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="phoneFrame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2c"/>
      <stop offset="50%" stop-color="#1a1a1c"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="phoneShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="40"/>
      <feOffset dx="0" dy="30"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1290" height="2796" fill="url(#bg1)"/>
  <ellipse cx="645" cy="1100" rx="900" ry="900" fill="url(#glow1)"/>

  <!-- Decorative dots -->
  <g fill="rgba(255,255,255,0.05)">
    <circle cx="120" cy="400" r="4"/>
    <circle cx="1170" cy="500" r="4"/>
    <circle cx="200" cy="2400" r="3"/>
    <circle cx="1100" cy="2300" r="3"/>
  </g>

  <!-- Headline -->
  <text x="645" y="220" font-family="Inter, -apple-system, sans-serif" font-size="92" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-2">Sab Kuch</text>
  <text x="645" y="320" font-family="Inter, sans-serif" font-size="92" font-weight="900" fill="#fbbf24" text-anchor="middle" letter-spacing="-2">Ek Nazar Mein</text>
  <text x="645" y="395" font-family="Inter, sans-serif" font-size="38" font-weight="500" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="2">REAL-TIME DASHBOARD</text>

  <!-- iPhone 17 Frame -->
  <g transform="translate(195, 500)" filter="url(#phoneShadow)">
    <!-- Outer frame -->
    <rect x="0" y="0" width="900" height="1900" rx="120" ry="120" fill="url(#phoneFrame)"/>
    <!-- Inner bezel -->
    <rect x="20" y="20" width="860" height="1860" rx="105" ry="105" fill="#000000"/>
    <!-- Screen -->
    <rect x="40" y="40" width="820" height="1820" rx="90" ry="90" fill="url(#screenGrad)"/>
    
    <!-- Dynamic Island -->
    <rect x="340" y="70" width="220" height="60" rx="30" ry="30" fill="#000000"/>
    
    <!-- Status bar -->
    <text x="100" y="115" font-family="-apple-system, sans-serif" font-size="32" font-weight="700" fill="#ffffff">9:41</text>
    <g transform="translate(720, 95)" fill="#ffffff">
      <rect x="0" y="5" width="6" height="20" rx="2"/>
      <rect x="10" y="0" width="6" height="25" rx="2"/>
      <rect x="20" y="-5" width="6" height="30" rx="2"/>
      <rect x="30" y="-10" width="6" height="35" rx="2"/>
      <rect x="50" y="0" width="50" height="22" rx="6" stroke="#ffffff" stroke-width="2" fill="none"/>
      <rect x="105" y="6" width="3" height="10" rx="1"/>
    </g>
    
    <!-- App Header -->
    <text x="100" y="240" font-family="Inter, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.8)">🌙 Good Evening</text>
    <text x="100" y="310" font-family="Inter, sans-serif" font-size="58" font-weight="900" fill="#ffffff">Malik 👋</text>
    <text x="100" y="360" font-family="Inter, sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.7)">👑 Malik Hosiery</text>
    
    <!-- Notification bell -->
    <circle cx="760" cy="290" r="45" fill="#ffffff"/>
    <text x="760" y="305" font-family="sans-serif" font-size="36" fill="#16a34a" text-anchor="middle">🔔</text>
    <circle cx="785" cy="265" r="10" fill="#ef4444"/>
    
    <!-- Today's Sales Card -->
    <rect x="80" y="430" width="740" height="500" rx="50" fill="#ffffff" opacity="0.97"/>
    <text x="120" y="510" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#16a34a" letter-spacing="2">✨ AAJ KI SALES</text>
    <text x="120" y="640" font-family="Inter, sans-serif" font-size="120" font-weight="900" fill="#15803d">Rs 67.5K</text>
    
    <!-- Trend badge -->
    <rect x="120" y="680" width="280" height="60" rx="30" fill="#dcfce7"/>
    <text x="260" y="722" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#15803d" text-anchor="middle">↗ +185% vs yesterday</text>
    
    <!-- Stats row -->
    <g transform="translate(120, 780)">
      <text x="0" y="0" font-family="Inter, sans-serif" font-size="24" fill="#737373">📦 47 orders</text>
      <text x="280" y="0" font-family="Inter, sans-serif" font-size="24" fill="#737373">🎯 Profit:</text>
      <text x="420" y="0" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#16a34a">Rs 24.3K</text>
    </g>
    
    <!-- 7-day trend chart -->
    <g transform="translate(120, 830)">
      <polyline points="0,40 80,30 160,45 240,20 320,35 400,15 480,5 560,10 640,0" 
                stroke="#16a34a" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <polygon points="0,40 80,30 160,45 240,20 320,35 400,15 480,5 560,10 640,0 640,80 0,80" 
               fill="#16a34a" opacity="0.15"/>
    </g>
    
    <!-- Register Open Card -->
    <rect x="80" y="980" width="740" height="180" rx="40" fill="#dcfce7"/>
    <circle cx="160" cy="1070" r="40" fill="#16a34a"/>
    <text x="160" y="1085" font-family="sans-serif" font-size="40" fill="#ffffff" text-anchor="middle">💼</text>
    <text x="230" y="1050" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#15803d" letter-spacing="1">● REGISTER OPEN</text>
    <text x="230" y="1110" font-family="Inter, sans-serif" font-size="42" font-weight="900" fill="#14532d">Rs 1,25,000</text>
    <text x="230" y="1145" font-family="Inter, sans-serif" font-size="22" fill="#15803d">Expected in drawer</text>
    
    <!-- Quick Actions Header -->
    <text x="100" y="1240" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#ffffff">⚡ Quick Actions</text>
    
    <!-- Action buttons grid -->
    <g transform="translate(80, 1280)">
      <rect x="0" y="0" width="180" height="180" rx="40" fill="#ffffff"/>
      <text x="90" y="100" font-size="60" text-anchor="middle">🛒</text>
      <text x="90" y="150" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#15803d" text-anchor="middle">New Sale</text>
      
      <rect x="200" y="0" width="180" height="180" rx="40" fill="#ffffff"/>
      <text x="290" y="100" font-size="60" text-anchor="middle">📦</text>
      <text x="290" y="150" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#15803d" text-anchor="middle">Products</text>
      
      <rect x="400" y="0" width="180" height="180" rx="40" fill="#ffffff"/>
      <text x="490" y="100" font-size="60" text-anchor="middle">👥</text>
      <text x="490" y="150" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#15803d" text-anchor="middle">Customers</text>
      
      <rect x="600" y="0" width="180" height="180" rx="40" fill="#ffffff"/>
      <text x="690" y="100" font-size="60" text-anchor="middle">📊</text>
      <text x="690" y="150" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#15803d" text-anchor="middle">Reports</text>
    </g>
    
    <!-- Net Profit Card -->
    <rect x="80" y="1510" width="740" height="220" rx="40" fill="#ffffff"/>
    <text x="120" y="1570" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#737373" letter-spacing="2">NET PROFIT TODAY</text>
    <text x="120" y="1670" font-family="Inter, sans-serif" font-size="80" font-weight="900" fill="#15803d">Rs 24,300</text>
    <rect x="640" y="1565" width="120" height="80" rx="20" fill="#dcfce7"/>
    <text x="700" y="1620" font-size="50" text-anchor="middle">📈</text>
    
    <!-- Bottom nav -->
    <rect x="80" y="1750" width="740" height="100" rx="50" fill="#ffffff"/>
    <text x="160" y="1810" font-size="40" text-anchor="middle">🏠</text>
    <circle cx="320" cy="1800" r="40" fill="#16a34a"/>
    <text x="320" y="1815" font-size="36" text-anchor="middle">🛒</text>
    <text x="480" y="1810" font-size="40" text-anchor="middle">📦</text>
    <text x="640" y="1810" font-size="40" text-anchor="middle">👥</text>
    <text x="760" y="1810" font-size="36" text-anchor="middle">≡</text>
  </g>

  <!-- Bottom badge -->
  <rect x="395" y="2680" width="500" height="60" rx="30" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
  <text x="645" y="2720" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="3">🇵🇰 MADE IN PAKISTAN</text>
</svg>
